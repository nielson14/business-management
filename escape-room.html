<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Ventures Escape Room — Business Management Review</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0A0C0F;--surface:#111418;--surface2:#181C22;--surface3:#1E2330;
  --border:#2A3040;--border2:#3A4560;
  --text:#E8EDF5;--text-muted:#8A9AB5;--text-dim:#4A5570;
  --green:#00FF88;--greend:#00CC66;--greenl:rgba(0,255,136,.1);--greenborder:rgba(0,255,136,.3);
  --red:#FF4466;--redl:rgba(255,68,102,.1);--redborder:rgba(255,68,102,.3);
  --blue:#4488FF;--bluel:rgba(68,136,255,.1);--blueborder:rgba(68,136,255,.3);
  --amber:#FFB800;--amberl:rgba(255,184,0,.1);--amberborder:rgba(255,184,0,.3);
  --purple:#AA44FF;--purplel:rgba(170,68,255,.1);--purpleborder:rgba(170,68,255,.3);
  --cyan:#00CCFF;--cyanl:rgba(0,204,255,.1);--cyanborder:rgba(0,204,255,.3);
  --room1:#4488FF;--room2:#00FF88;--room3:#AA44FF;--room4:#FFB800;--room5:#FF4466;--room6:#00CCFF;
  --mono:'Share Tech Mono',monospace;--display:'Rajdhani',sans-serif;--body:'Exo 2',sans-serif;
  --radius:8px;--radius-sm:4px;
}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* SCANLINE EFFECT */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none;z-index:9999;}

/* HUD HEADER */
.hud{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,12,15,.95);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0;height:52px;backdrop-filter:blur(10px);}
.hud-brand{padding:0 1.25rem;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;gap:.65rem;flex-shrink:0;}
.hud-logo{font-size:1.1rem;}
.hud-title{font-family:var(--display);font-size:.9rem;font-weight:700;color:var(--green);letter-spacing:.06em;}
.hud-rooms{display:flex;flex:1;}
.hud-room{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--border);font-size:.58rem;font-family:var(--display);letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);transition:all .3s;gap:.15rem;cursor:default;}
.hud-room.active{color:var(--text);}
.hud-room.complete{color:var(--green);}
.hud-room-num{font-size:.72rem;font-weight:700;}
.hud-room-name{font-size:.52rem;}
.hud-stats{display:flex;align-items:stretch;border-left:1px solid var(--border);flex-shrink:0;}
.hud-stat{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 1rem;border-right:1px solid var(--border);gap:.1rem;}
.hud-stat:last-child{border-right:none;}
.hud-stat-label{font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);font-family:var(--display);}
.hud-stat-val{font-family:var(--mono);font-size:.9rem;font-weight:700;}
#timer-val{color:var(--green);}
#timer-val.warn{color:var(--amber);animation:pulse .8s infinite;}
#timer-val.danger{color:var(--red);animation:pulse .4s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* MAIN CONTENT */
.room-container{padding-top:52px;min-height:100vh;display:flex;flex-direction:column;}
.room-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2rem;max-width:900px;margin:0 auto;width:100%;}

/* INTRO SCREEN */
.intro-hero{text-align:center;padding:2rem 0 1.5rem;}
.intro-logo{font-size:4rem;margin-bottom:1rem;animation:flicker 3s infinite;}
@keyframes flicker{0%,90%,100%{opacity:1}92%{opacity:.8}94%{opacity:1}96%{opacity:.7}98%{opacity:1}}
.intro-title{font-family:var(--display);font-size:2.8rem;font-weight:800;letter-spacing:.04em;margin-bottom:.5rem;background:linear-gradient(135deg,var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.intro-subtitle{font-size:.9rem;color:var(--text-muted);margin-bottom:2rem;line-height:1.6;}
.briefing-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;text-align:left;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.briefing-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--green));}
.briefing-title{font-family:var(--display);font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--green);margin-bottom:.85rem;}
.briefing-text{font-size:.85rem;color:var(--text-muted);line-height:1.75;}
.briefing-text strong{color:var(--text);}
.room-preview{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;margin-bottom:1.5rem;}
.rp-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem;display:flex;align-items:center;gap:.6rem;}
.rp-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:.75rem;font-weight:700;flex-shrink:0;}
.rp-info{}
.rp-name{font-size:.75rem;font-weight:600;margin-bottom:.1rem;}
.rp-topic{font-size:.62rem;color:var(--text-dim);}
.name-input-wrap{display:flex;gap:.75rem;align-items:center;margin-bottom:1rem;}
.name-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1rem;font-family:var(--body);font-size:.95rem;color:var(--text);outline:none;transition:border-color .15s;}
.name-input:focus{border-color:var(--green);}
.name-input::placeholder{color:var(--text-dim);}
.start-btn{background:linear-gradient(135deg,var(--blue),var(--green));color:#000;font-family:var(--display);font-size:1rem;font-weight:800;padding:.85rem 2.5rem;border:none;border-radius:var(--radius-sm);cursor:pointer;letter-spacing:.06em;transition:all .2s;}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,255,136,.3);}

/* ROOM HEADER */
.room-header{width:100%;margin-bottom:1.5rem;}
.room-title-bar{display:flex;align-items:center;gap:1rem;margin-bottom:.75rem;}
.room-num-badge{font-family:var(--mono);font-size:.7rem;padding:.3rem .75rem;border-radius:var(--radius-sm);font-weight:700;border:1px solid;}
.room-title{font-family:var(--display);font-size:1.6rem;font-weight:800;letter-spacing:.02em;}
.room-narrative{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.85rem 1.1rem;font-size:.82rem;color:var(--text-muted);line-height:1.65;position:relative;}
.room-narrative::before{content:'📡 TRANSMISSION';position:absolute;top:-8px;left:12px;font-family:var(--display);font-size:.58rem;letter-spacing:.15em;background:var(--bg);padding:0 .4rem;color:var(--text-dim);}

/* VAULT */
.vault{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:1.5rem;width:100%;margin-bottom:1rem;position:relative;overflow:hidden;}
.vault-label{font-family:var(--display);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:1rem;}
.vault.unlocked{border-color:var(--green);background:var(--greenl);}
.vault.locked{border-color:var(--border2);}

/* CODE INPUT */
.code-display{display:flex;gap:.5rem;justify-content:center;margin:1rem 0;}
.code-digit{width:52px;height:64px;background:var(--surface2);border:2px solid var(--border2);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:1.8rem;font-weight:700;color:var(--green);transition:all .3s;}
.code-digit.filled{border-color:var(--green);background:var(--greenl);}
.code-digit.wrong{border-color:var(--red);background:var(--redl);animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* PUZZLE ELEMENTS */
.puzzle-section{margin-bottom:1.25rem;}
.puzzle-label{font-family:var(--display);font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.65rem;display:flex;justify-content:space-between;align-items:center;}
.puzzle-label span{font-size:.58rem;color:var(--text-dim);}

/* MATCHING */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.match-col-label{font-family:var(--display);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.5rem;text-align:center;}
.match-items{display:flex;flex-direction:column;gap:.4rem;}
.match-item{padding:.55rem .85rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.8rem;cursor:pointer;transition:all .15s;text-align:center;user-select:none;}
.match-item:hover{border-color:var(--text-muted);}
.match-item.selected{border-color:var(--blue);background:var(--bluel);color:var(--blue);}
.match-item.matched{border-color:var(--green);background:var(--greenl);color:var(--green);cursor:default;}
.match-item.wrong-match{border-color:var(--red);background:var(--redl);animation:shake .3s ease;}

/* MULTIPLE CHOICE */
.mc-opts{display:flex;flex-direction:column;gap:.4rem;}
.mc-opt{display:flex;align-items:center;gap:.75rem;padding:.65rem .9rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;font-size:.83rem;}
.mc-opt:hover{border-color:var(--text-muted);background:var(--surface2);}
.mc-opt.correct-anim{border-color:var(--green);background:var(--greenl);color:var(--green);}
.mc-opt.wrong-anim{border-color:var(--red);background:var(--redl);animation:shake .3s ease;}
.mc-letter{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:.72rem;font-weight:700;flex-shrink:0;color:var(--text-dim);}

/* SORT BINS */
.sort-area{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.sort-bin{background:var(--surface2);border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:.85rem;min-height:90px;}
.sort-bin-label{font-family:var(--display);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.6rem;font-weight:700;}
.sort-items-pool{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem;}
.sort-item{padding:.35rem .75rem;border:1.5px solid var(--border);border-radius:100px;font-size:.75rem;cursor:pointer;background:var(--surface2);transition:all .15s;user-select:none;}
.sort-item:hover{border-color:var(--blue);background:var(--bluel);}
.sort-item.placed{opacity:.35;cursor:default;}
.sort-item.in-bin{display:inline-flex;align-items:center;gap:.3rem;cursor:pointer;}
.sort-item.in-bin:hover{border-color:var(--red);}

/* FINANCE INPUT */
.fin-table{width:100%;border-collapse:collapse;margin-bottom:1rem;}
.fin-table td{padding:.45rem .75rem;border:1px solid var(--border);font-size:.82rem;}
.fin-table tr.section-hdr td{background:var(--surface2);font-family:var(--display);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}
.fin-table tr.total-row td{background:var(--surface3);font-weight:700;border-top:2px solid var(--border2);}
.fin-input{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:.35rem .6rem;font-family:var(--mono);font-size:.82rem;color:var(--green);width:130px;text-align:right;outline:none;transition:border-color .15s;}
.fin-input:focus{border-color:var(--green);}
.fin-input.correct{border-color:var(--green);background:var(--greenl);}
.fin-input.incorrect{border-color:var(--red);background:var(--redl);}
.fin-calc{font-family:var(--mono);font-size:.82rem;color:var(--text-muted);text-align:right;}

/* DECIDE STEPS */
.decide-steps{display:flex;flex-direction:column;gap:.5rem;}
.decide-step{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.85rem 1rem;transition:all .2s;}
.decide-step.active-step{border-color:var(--green);background:var(--greenl);}
.decide-step.done-step{border-color:var(--green);opacity:.6;}
.decide-step.locked-step{opacity:.35;}
.decide-step-header{display:flex;align-items:center;gap:.65rem;margin-bottom:.5rem;}
.decide-letter{width:28px;height:28px;border-radius:50%;background:var(--surface3);border:1.5px solid var(--border2);font-family:var(--display);font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.decide-step.active-step .decide-letter{background:var(--green);border-color:var(--green);color:#000;}
.decide-step.done-step .decide-letter{background:var(--greenl);border-color:var(--green);color:var(--green);}
.decide-step-name{font-family:var(--display);font-size:.85rem;font-weight:700;}
.decide-step-hint{font-size:.75rem;color:var(--text-muted);}

/* NOTIFICATIONS */
.notification{position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:200;padding:.75rem 1.5rem;border-radius:var(--radius-sm);font-family:var(--display);font-size:.85rem;font-weight:700;letter-spacing:.04em;border:1px solid;animation:notifIn .2s ease;max-width:500px;text-align:center;}
.notification.success{background:var(--greenl);border-color:var(--greenborder);color:var(--green);}
.notification.error{background:var(--redl);border-color:var(--redborder);color:var(--red);}
.notification.hint{background:var(--amberl);border-color:var(--amberborder);color:var(--amber);}
.notification.penalty{background:var(--redl);border-color:var(--redborder);color:var(--red);}
@keyframes notifIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* HINT BUTTON */
.hint-btn{background:transparent;border:1px solid var(--amberborder);color:var(--amber);font-family:var(--display);font-size:.72rem;font-weight:600;padding:.35rem .85rem;border-radius:var(--radius-sm);cursor:pointer;letter-spacing:.06em;transition:all .15s;}
.hint-btn:hover{background:var(--amberl);}
.hint-btn:disabled{opacity:.35;cursor:not-allowed;}
.hint-used{font-size:.65rem;color:var(--text-dim);margin-left:.4rem;}

/* ACTION BUTTONS */
.action-btn{font-family:var(--display);font-size:.85rem;font-weight:700;padding:.6rem 1.5rem;border-radius:var(--radius-sm);border:none;cursor:pointer;letter-spacing:.04em;transition:all .2s;}
.action-btn.primary{background:var(--green);color:#000;}
.action-btn.primary:hover{background:var(--greend);transform:translateY(-1px);}
.action-btn.secondary{background:transparent;border:1px solid var(--border2);color:var(--text-muted);}
.action-btn.secondary:hover{border-color:var(--text-muted);color:var(--text);}
.btn-row{display:flex;gap:.65rem;align-items:center;margin-top:1rem;flex-wrap:wrap;}

/* COMPLETION */
.complete-screen{text-align:center;padding:2rem;}
.complete-icon{font-size:5rem;margin-bottom:1rem;animation:bounce 1s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.complete-title{font-family:var(--display);font-size:2.5rem;font-weight:800;letter-spacing:.04em;margin-bottom:.5rem;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin:1.5rem 0;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;text-align:center;}
.stat-val{font-family:var(--mono);font-size:1.6rem;font-weight:700;margin-bottom:.25rem;}
.stat-label{font-size:.65rem;font-family:var(--display);letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);}
.leaderboard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin:1rem 0;text-align:left;}
.lb-title{font-family:var(--display);font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.85rem;}
.lb-row{display:flex;align-items:center;gap.75rem;padding:.5rem .65rem;border-radius:var(--radius-sm);font-size:.82rem;margin-bottom:.3rem;}
.lb-row.you{background:var(--greenl);border:1px solid var(--greenborder);}
.lb-rank{font-family:var(--mono);font-size:.75rem;color:var(--text-dim);width:28px;}
.lb-name{flex:1;font-weight:600;}
.lb-time{font-family:var(--mono);font-size:.78rem;color:var(--green);}
.lb-hints{font-size:.68rem;color:var(--text-dim);margin-left:.5rem;}

@media(max-width:600px){
  .room-preview,.match-grid,.sort-area,.stats-grid{grid-template-columns:1fr;}
  .code-digit{width:40px;height:52px;font-size:1.4rem;}
}
</style>
</head>
<body>

<!-- HUD -->
<div class="hud" id="hud">
  <div class="hud-brand">
    <div class="hud-logo">🔐</div>
    <div class="hud-title">APEX VENTURES</div>
  </div>
  <div class="hud-rooms" id="hud-rooms"></div>
  <div class="hud-stats">
    <div class="hud-stat">
      <div class="hud-stat-label">Time Left</div>
      <div class="hud-stat-val" id="timer-val">50:00</div>
    </div>
    <div class="hud-stat">
      <div class="hud-stat-label">Hints Used</div>
      <div class="hud-stat-val" style="color:var(--amber)" id="hints-val">0</div>
    </div>
    <div class="hud-stat">
      <div class="hud-stat-label">Penalties</div>
      <div class="hud-stat-val" style="color:var(--red)" id="penalties-val">0</div>
    </div>
  </div>
</div>

<div class="room-container" id="room-container"></div>

<script>
// ── GAME STATE ──
const TOTAL_SECONDS = 50 * 60;
let timeRemaining = TOTAL_SECONDS;
let timerInterval = null;
let currentRoom = 0; // 0 = intro
let playerName = '';
let hintsUsed = 0;
let penalties = 0;
let roomHintUsed = [false,false,false,false,false,false];
let roomStartTime = 0;
let gameStartTime = 0;
let gameComplete = false;

const ROOMS = [
  { name:'Economy', color:'var(--room1)', topic:'Business Cycles & Economic Systems' },
  { name:'Decision', color:'var(--room2)', topic:'DECIDE Framework' },
  { name:'Leadership', color:'var(--room3)', topic:'Leadership & Motivation' },
  { name:'HR & Law', color:'var(--room4)', topic:'HR & Employment Law' },
  { name:'Finance', color:'var(--room5)', topic:'Financial Statements' },
  { name:'Ethics', color:'var(--room6)', topic:'Ethics & Compliance' },
];

// ── TIMER ──
function startTimer(){
  timerInterval = setInterval(()=>{
    if(gameComplete)return;
    timeRemaining--;
    updateTimerDisplay();
    if(timeRemaining<=0){clearInterval(timerInterval);timeOut();}
  },1000);
}

function updateTimerDisplay(){
  const m = Math.floor(timeRemaining/60);
  const s = timeRemaining%60;
  const el = document.getElementById('timer-val');
  if(!el)return;
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
  el.className = 'hud-stat-val' + (timeRemaining<300?'danger':timeRemaining<600?' warn':'');
}

function addPenalty(seconds=60){
  timeRemaining = Math.max(0, timeRemaining - seconds);
  penalties++;
  document.getElementById('penalties-val').textContent = penalties;
  updateTimerDisplay();
}

function timeOut(){
  showNotification('⏰ Time\'s up! The company couldn\'t be saved.','error',3000);
  setTimeout(()=>renderComplete(false),3000);
}

// ── HUD ──
function updateHUD(){
  const el = document.getElementById('hud-rooms');
  if(!el)return;
  el.innerHTML = ROOMS.map((r,i)=>`
    <div class="hud-room ${currentRoom===i+1?'active':currentRoom>i+1?'complete':''}">
      <div class="hud-room-num" style="color:${currentRoom>i+1?'var(--green)':currentRoom===i+1?r.color:'var(--text-dim)'}">${currentRoom>i+1?'✓':i+1}</div>
      <div class="hud-room-name">${r.name}</div>
    </div>`).join('');
  document.getElementById('hints-val').textContent = hintsUsed;
  document.getElementById('penalties-val').textContent = penalties;
}

// ── NOTIFICATIONS ──
function showNotification(msg, type='success', duration=2500){
  document.querySelectorAll('.notification').forEach(el=>el.remove());
  const el = document.createElement('div');
  el.className = `notification ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), duration);
}

// ── HINT SYSTEM ──
function useHint(roomIdx, hintText){
  if(roomHintUsed[roomIdx]){
    // Second hint costs time
    addPenalty(60);
    hintsUsed++;
    showNotification(`💡 HINT (−60s): ${hintText}`, 'hint', 6000);
  } else {
    roomHintUsed[roomIdx] = true;
    hintsUsed++;
    showNotification(`💡 FREE HINT: ${hintText}`, 'hint', 6000);
  }
  document.getElementById('hints-val').textContent = hintsUsed;
}

// ── INTRO ──
function renderIntro(){
  currentRoom = 0;
  updateHUD();
  document.getElementById('room-container').innerHTML = `
  <div class="room-screen">
    <div class="intro-hero">
      <div class="intro-logo">🏢</div>
      <div class="intro-title">APEX VENTURES<br>ESCAPE ROOM</div>
      <div class="intro-subtitle">Business Management · Final Review · All 6 Strands</div>
    </div>

    <div class="briefing-card">
      <div class="briefing-title">📡 Mission Briefing</div>
      <div class="briefing-text">

let r4SelectedQuestion = null;
function r4MoveToPool(id){
  // If item is in a bin, move it back to pool
  r4LegalBin = r4LegalBin.filter(q=>q!==id);
  r4IllegalBin = r4IllegalBin.filter(q=>q!==id);

}

function r4PlaceInBin(bin){
  if(!r4SelectedQuestion) return;
  if(bin==='legal'){ if(!r4LegalBin.includes(r4SelectedQuestion)) r4LegalBin.push(r4SelectedQuestion); }
  else { if(!r4IllegalBin.includes(r4SelectedQuestion)) r4IllegalBin.push(r4SelectedQuestion); }
  document.getElementById('r4-sort-instruction').textContent = '';
  r4SelectedQuestion = null;
  r4RefreshSort();
}

function r4RefreshSort(){
  const pool = document.getElementById('r4-pool');
  const legal = document.getElementById('r4-legal-items');
  const illegal = document.getElementById('r4-illegal-items');
  if(!pool||!legal||!illegal) return;

  const placed = [...r4LegalBin,...r4IllegalBin];
  pool.innerHTML = R4_QUESTIONS.filter(q=>!placed.includes(q.id)).map(q=>`<div class="sort-item ${r4SelectedQuestion===q.id?'selected':''}" onclick="r4MoveToPool('${q.id}')">${q.text.substring(0,45)}...</div>`).join('');
  legal.innerHTML = r4LegalBin.map(id=>{ const q=R4_QUESTIONS.find(q=>q.id===id); return`<div class="sort-item in-bin" onclick="r4MoveToPool('${id}')">${q?.text.substring(0,30)}... ✕</div>`; }).join('');
  illegal.innerHTML = r4IllegalBin.map(id=>{ const q=R4_QUESTIONS.find(q=>q.id===id); return`<div class="sort-item in-bin" onclick="r4MoveToPool('${id}')">${q?.text.substring(0,30)}... ✕</div>`; }).join('');
}

function r4CheckSort(){
  const allPlaced = r4LegalBin.length + r4IllegalBin.length === R4_QUESTIONS.length;
  if(!allPlaced){ showNotification('Sort ALL 8 questions before checking.','error',2000); return; }

  let correct = true;
  R4_QUESTIONS.forEach(q=>{
    const inLegal = r4LegalBin.includes(q.id);
    const inIllegal = r4IllegalBin.includes(q.id);
    if(q.legal && !inLegal) correct = false;
    if(!q.legal && !inIllegal) correct = false;
  });

  if(correct){
    showNotification('✓ Perfect sort! All questions correctly categorized.','success');
    const v=document.getElementById('v4-agency');
    if(v){v.style.opacity='1';v.style.pointerEvents='auto';}

}

function calcR5(){
  const totalRev = R5_DATA.salesRevenue + R5_DATA.serviceRevenue;
  const grossProfit = totalRev - R5_DATA.cogs;
  const totalOpEx = R5_DATA.salaries + R5_DATA.rent + R5_DATA.marketing + R5_DATA.depreciation;
  const opIncome = grossProfit - totalOpEx;
  const ebt = opIncome - R5_DATA.interest;
  const tax = Math.round(Math.max(0,ebt) * 0.21);
  const netIncome = ebt - tax;
  const beUnits = Math.ceil(R5_DATA.fixedCosts / (R5_DATA.unitPrice - R5_DATA.unitVarCost));
  return {totalRev, grossProfit, totalOpEx, opIncome, ebt, tax, netIncome, beUnits};
}

  const myRank = board.findIndex(e=>e.name===playerName&&e.elapsed===elapsedSeconds)+1;

  document.getElementById('room-container').innerHTML = `
  <div class="room-screen">
    <div class="complete-screen">
      ${success?`
        <div class="complete-icon">🏆</div>
        <div class="complete-title">APEX VENTURES SAVED!</div>
        <div style="color:var(--text-muted);margin-bottom:1rem;font-size:.9rem">All 6 vaults unlocked — the company's systems are restored.</div>
      `:`
        <div style="font-size:4rem;margin-bottom:1rem">💀</div>
        <div class="complete-title" style="background:linear-gradient(135deg,var(--red),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">TIME EXPIRED</div>
        <div style="color:var(--text-muted);margin-bottom:1rem">The company couldn't be saved. Study up and try again.</div>
      `}

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-val" style="color:${success?'var(--green)':'var(--red)'}">${success?timeStr:'—'}</div>
          <div class="stat-label">Completion Time</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:var(--cyan)">${currentRoom > 6 ? 6 : currentRoom-1}/6</div>
          <div class="stat-label">Vaults Opened</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:var(--amber)">${hintsUsed}</div>
          <div class="stat-label">Hints Used</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:var(--red)">${penalties}</div>
          <div class="stat-label">Penalties</div>
        </div>
      </div>

      ${success&&myRank>0?`<div style="background:var(--greenl);border:1px solid var(--greenborder);border-radius:var(--radius-sm);padding:.75rem 1.25rem;margin-bottom:1rem;font-family:var(--display);font-size:.85rem;color:var(--green)">🏆 You ranked #${myRank} on the class leaderboard!</div>`:''}

      <div class="leaderboard">
        <div class="lb-title">🏆 Class Leaderboard — Top 10</div>
        ${board.length===0?'<div style="color:var(--text-dim);font-size:.8rem">No entries yet</div>':
          board.map((e,i)=>`
            <div class="lb-row ${e.name===playerName&&e.elapsed===elapsedSeconds?'you':''}">
              <div class="lb-rank">#${i+1}</div>
              <div class="lb-name">${e.name}</div>
              <div class="lb-time">${e.timeStr}</div>
              <div class="lb-hints">💡${e.hints} ⚠️${e.penalties}</div>
            </div>`).join('')}
      </div>

      <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;margin-top:.5rem">
        <button class="action-btn primary" onclick="location.reload()">🔄 Play Again</button>
        <button class="action-btn secondary" onclick="if(confirm('Clear the class leaderboard? Do this between class periods.')){localStorage.removeItem('apex_lb');location.reload();}">🗑️ Clear Leaderboard</button>
        <button class="action-btn secondary" onclick="window.print()">🖨️ Print Results</button>
      </div>
    </div>
  </div>`;
}

// ── INIT ──
renderIntro();
</script>
</body>
</html>
