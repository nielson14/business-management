<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Statements Simulator – Business Management</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0EEE8;--surface:#FFFFFF;--surface2:#F5F3EE;--surface3:#EAE8E2;
  --border:#D8D4CC;--text:#1A1916;--text-muted:#6A6560;--text-dim:#AAA89E;
  --ink:#1A1916;
  --green:#1B5E20;--greenl:#E8F5E9;--greenm:rgba(27,94,32,.2);
  --red:#B71C1C;--redl:#FFEBEE;--redm:rgba(183,28,28,.2);
  --blue:#0D47A1;--bluel:#E3F2FD;--bluem:rgba(13,71,161,.2);
  --amber:#E65100;--amberl:#FFF3E0;--amberm:rgba(230,81,0,.2);
  --purple:#4A148C;--purplel:#F3E5F5;--purplem:rgba(74,20,140,.2);
  --teal:#004D40;--teall:#E0F2F1;--tealm:rgba(0,77,64,.2);
  --phase1:#0D47A1;--phase1l:#E3F2FD;
  --phase2:#1B5E20;--phase2l:#E8F5E9;
  --phase3:#4A148C;--phase3l:#F3E5F5;
  --radius:10px;--radius-sm:6px;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
header{background:var(--ink);color:#F0EEE8;display:flex;align-items:stretch;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--green);}
.hbrand{padding:1rem 1.75rem;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;justify-content:center;flex-shrink:0;}
.hbrand h1{font-family:var(--mono);font-size:1rem;font-weight:700;color:#F0EEE8;letter-spacing:-.3px;}
.hbrand .sub{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(240,238,232,.35);margin-top:.25rem;}
.hphases{display:flex;flex:1;}
.hphase{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.6rem .5rem;border-right:1px solid rgba(255,255,255,.06);font-size:.65rem;color:rgba(240,238,232,.3);cursor:default;transition:all .2s;gap:.15rem;}
.hphase.active{background:rgba(255,255,255,.06);color:#F0EEE8;}
.hphase.done{color:rgba(100,200,120,.7);}
.hphase-icon{font-size:1.1rem;}
.hphase-name{font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;}
.hright{padding:.75rem 1.5rem;border-left:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:1.25rem;flex-shrink:0;}
.hstat{text-align:center;}
.hstat-label{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,238,232,.3);}
.hstat-val{font-family:var(--mono);font-size:.9rem;font-weight:700;}
.hstat-val.pos{color:#81C784;}
.hstat-val.neg{color:#EF9A9A;}
.hstat-val.neu{color:#FFD54F;}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 65px);}
.sidebar{background:var(--ink);color:#F0EEE8;padding:1.25rem;display:flex;flex-direction:column;gap:1.5rem;border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;}
.main{padding:1.75rem;overflow-y:auto;}
.sb-label{font-family:var(--mono);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(240,238,232,.25);margin-bottom:.65rem;}

/* ── SIDEBAR ── */
.company-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);padding:.9rem;}
.company-name{font-family:var(--mono);font-size:.95rem;font-weight:700;color:#F0EEE8;margin-bottom:.2rem;}
.company-industry{font-size:.65rem;color:rgba(240,238,232,.4);}
.company-year{font-size:.62rem;color:rgba(240,238,232,.3);margin-top:.35rem;}

.stmt-progress{display:flex;flex-direction:column;gap:.4rem;}
.sp-row{display:flex;align-items:center;gap:.6rem;padding:.5rem .6rem;border-radius:var(--radius-sm);border:1px solid transparent;transition:all .2s;}
.sp-row.active{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);}
.sp-row.done{opacity:.55;}
.sp-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sp-name{font-family:var(--mono);font-size:.72rem;color:rgba(240,238,232,.4);transition:color .2s;}
.sp-row.active .sp-name{color:#F0EEE8;}
.sp-check{margin-left:auto;font-size:.7rem;color:rgba(100,200,120,.8);}

.key-numbers{display:flex;flex-direction:column;gap:.4rem;}
.kn-row{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius-sm);padding:.5rem .65rem;display:flex;justify-content:space-between;align-items:center;}
.kn-label{font-size:.62rem;color:rgba(240,238,232,.4);}
.kn-val{font-family:var(--mono);font-size:.78rem;font-weight:600;}
.kn-val.pos{color:#81C784;}
.kn-val.neg{color:#EF9A9A;}
.kn-val.neu{color:#FFD54F;}
.kn-val.empty{color:rgba(240,238,232,.2);}

.formula-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:.75rem;}
.formula-title{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,238,232,.3);margin-bottom:.5rem;}
.formula-line{font-family:var(--mono);font-size:.68rem;color:rgba(240,238,232,.6);line-height:1.7;}
.formula-line.highlight{color:#FFD54F;}

/* ── MAIN CONTENT ── */
.phase-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:1rem;}
.ph-num{font-family:var(--mono);font-size:3rem;font-weight:700;line-height:1;flex-shrink:0;width:55px;}
.ph-title{font-size:1.4rem;font-weight:700;margin-bottom:.3rem;letter-spacing:-.3px;}
.ph-sub{font-size:.8rem;color:var(--text-muted);line-height:1.6;max-width:500px;}
.ph-badge{font-family:var(--mono);font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:.22rem .6rem;border-radius:2px;margin-left:auto;flex-shrink:0;}

/* ── FINANCIAL TABLE ── */
.fin-table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem;}
.ftc-header{padding:.85rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ftc-title{font-family:var(--mono);font-size:.82rem;font-weight:700;letter-spacing:-.2px;}
.ftc-subtitle{font-size:.72rem;color:var(--text-muted);}

.fin-table{width:100%;border-collapse:collapse;}
.fin-table th{text-align:left;padding:.55rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}
.fin-table th.right{text-align:right;}
.fin-table td{padding:.5rem 1rem;border-bottom:1px solid var(--border);font-size:.84rem;vertical-align:middle;}
.fin-table td.amount{font-family:var(--mono);font-size:.82rem;text-align:right;width:130px;}
.fin-table td.amount input{font-family:var(--mono);font-size:.82rem;text-align:right;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.3rem .5rem;width:110px;background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s;}
.fin-table td.amount input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(13,71,161,.1);}
.fin-table td.amount input.correct{border-color:var(--green);background:var(--greenl);}
.fin-table td.amount input.incorrect{border-color:var(--red);background:var(--redl);}
.fin-table tr.section-header td{background:var(--surface2);font-weight:700;font-size:.75rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);padding:.4rem 1rem;}
.fin-table tr.subtotal td{background:var(--surface2);font-weight:700;}
.fin-table tr.subtotal td.amount{font-family:var(--mono);}
.fin-table tr.total-row td{background:var(--ink);color:#F0EEE8;font-weight:700;font-size:.9rem;}
.fin-table tr.total-row td.amount{font-family:var(--mono);font-size:.9rem;}
.fin-table tr.highlight-row td{background:var(--greenl);color:var(--green);font-weight:700;}
.fin-table tr.highlight-row.loss td{background:var(--redl);color:var(--red);}

.item-name{display:flex;align-items:center;gap:.5rem;}
.item-tooltip{cursor:help;font-size:.7rem;color:var(--text-dim);position:relative;}
.item-tooltip:hover::after{content:attr(data-tip);position:absolute;left:100%;top:50%;transform:translateY(-50%);background:var(--ink);color:#F0EEE8;font-size:.68rem;padding:.35rem .6rem;border-radius:var(--radius-sm);white-space:nowrap;margin-left:.4rem;z-index:10;max-width:220px;white-space:normal;line-height:1.4;}
.item-category{font-size:.6rem;font-family:var(--mono);padding:.1rem .35rem;border-radius:2px;font-weight:600;margin-left:.25rem;}

/* ── DRAG & DROP CATEGORIZER ── */
.categorizer{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;}
.cat-title{font-family:var(--mono);font-size:.82rem;font-weight:700;margin-bottom:.85rem;}
.cat-grid{display:grid;grid-template-columns:1fr 2fr;gap:1.25rem;}
.items-pool{display:flex;flex-direction:column;gap:.4rem;}
.pool-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.35rem;}
.pool-item{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.5rem .75rem;font-size:.8rem;cursor:grab;transition:all .15s;display:flex;justify-content:space-between;align-items:center;user-select:none;}
.pool-item:hover{border-color:var(--blue);background:var(--bluel);}
.pool-item.placed{opacity:.35;cursor:default;}
.pool-item .item-amount{font-family:var(--mono);font-size:.75rem;font-weight:700;color:var(--text-muted);}
.drop-zones{display:flex;flex-direction:column;gap:.65rem;}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:.65rem .85rem;min-height:60px;transition:all .2s;}
.drop-zone.drag-over{border-color:var(--blue);background:var(--bluel);}
.drop-zone-label{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:700;margin-bottom:.4rem;}
.drop-zone-items{display:flex;flex-wrap:wrap;gap:.35rem;}
.placed-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.3rem .6rem;font-size:.72rem;display:flex;align-items:center;gap:.3rem;cursor:pointer;}
.placed-item.correct{border-color:var(--green);background:var(--greenl);color:var(--green);}
.placed-item.incorrect{border-color:var(--red);background:var(--redl);color:var(--red);}
.placed-item .remove-btn{font-size:.8rem;opacity:.5;cursor:pointer;}
.placed-item .remove-btn:hover{opacity:1;}

/* ── BALANCE CHECK ── */
.balance-check{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius-sm);padding:1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;}
.bc-item{text-align:center;}
.bc-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.25rem;}
.bc-val{font-family:var(--mono);font-size:1.1rem;font-weight:700;}
.bc-equals{font-family:var(--mono);font-size:1.4rem;color:var(--text-muted);}
.bc-status{font-size:.78rem;font-weight:700;padding:.35rem .85rem;border-radius:100px;}
.bc-status.balanced{background:var(--greenl);color:var(--green);}
.bc-status.unbalanced{background:var(--redl);color:var(--red);}

/* ── ANALYSIS QUESTIONS ── */
.analysis-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1.25rem;}
.analysis-q{margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
.analysis-q:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.aq-num{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.35rem;}
.aq-question{font-size:.9rem;font-weight:600;margin-bottom:.5rem;line-height:1.4;}
.aq-data{font-family:var(--mono);font-size:.72rem;color:var(--text-muted);background:var(--surface2);padding:.5rem .75rem;border-radius:var(--radius-sm);margin-bottom:.5rem;line-height:1.6;}
textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.7rem .85rem;font-family:var(--sans);font-size:.84rem;color:var(--text);resize:vertical;min-height:80px;outline:none;line-height:1.6;transition:border-color .15s;}
textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(13,71,161,.1);}
textarea::placeholder{color:var(--text-dim);}

/* ── SCENARIO SELECTOR ── */
.scenario-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem;}
.sc-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:1.25rem;cursor:pointer;transition:all .2s;}
.sc-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08);}
.sc-card.selected{border-color:var(--blue);}
.sc-emoji{font-size:2rem;margin-bottom:.5rem;}
.sc-name{font-weight:700;font-size:.95rem;margin-bottom:.25rem;}
.sc-type{font-family:var(--mono);font-size:.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;}
.sc-desc{font-size:.75rem;color:var(--text-muted);line-height:1.45;}
.sc-health{display:flex;gap:.4rem;margin-top:.75rem;flex-wrap:wrap;}
.sc-health-pill{font-size:.62rem;font-weight:600;padding:.15rem .5rem;border-radius:100px;}

/* ── FEEDBACK ── */
.feedback-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.fb-header{background:var(--ink);color:#F0EEE8;padding:1.1rem 1.5rem;display:flex;align-items:center;gap:.85rem;}
.fb-icon{font-size:1.6rem;}
.fb-title{font-family:var(--mono);font-size:.95rem;font-weight:700;}
.fb-sub{font-family:var(--mono);font-size:.6rem;color:rgba(240,238,232,.4);letter-spacing:.08em;text-transform:uppercase;}
.fb-body{padding:1.6rem;font-size:.87rem;line-height:1.85;color:var(--text);white-space:pre-wrap;min-height:80px;}
.score-row{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1.1rem;}
.sc{font-size:.67rem;font-weight:700;padding:.27rem .75rem;border-radius:100px;font-family:var(--mono);}
.sc.great{background:var(--greenl);color:var(--green);border:1px solid var(--greenm);}
.sc.ok{background:var(--amberl);color:var(--amber);border:1px solid var(--amberm);}
.sc.needs{background:var(--redl);color:var(--red);border:1px solid var(--redm);}

.typing-dot{display:inline-block;width:6px;height:6px;background:var(--blue);border-radius:50%;animation:blink 1.2s infinite;margin:0 2px;vertical-align:middle;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}

/* ── BUTTONS ── */
.btn{font-family:var(--sans);font-size:.86rem;font-weight:600;padding:.62rem 1.4rem;border-radius:var(--radius-sm);border:none;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--ink);color:#F0EEE8;}
.btn-primary:hover{background:#333;transform:translateY(-1px);}
.btn-primary:disabled{background:var(--border);color:var(--text-dim);cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border);}
.btn-outline:hover{border-color:var(--text-muted);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#1B5E20;}
.btn-row{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-top:1.1rem;}

.inst-box{padding:.8rem 1rem;border-radius:var(--radius-sm);font-size:.8rem;line-height:1.6;margin-bottom:1rem;border-left:3px solid;}
.divider{height:1px;background:var(--border);margin:1.25rem 0;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .scenario-grid,.cat-grid{grid-template-columns:1fr;}
}
</style>
</head>

<div id="app"></div>
<script>

// ── SCENARIOS ──

let scenario=null;
let incomeData={};
let balanceData={};

// ── COMPUTED VALUES ──
function calcIncome(s){
  const d=s.data;
  const totalRevenue=d.salesRevenue+d.serviceRevenue;
  const grossProfit=totalRevenue-d.cogs;
  const totalOpEx=d.salariesWages+d.rentUtilities+d.marketingAdv+d.depreciation;
  const operatingIncome=grossProfit-totalOpEx;
  const ebt=operatingIncome-d.interestExpense;
  const taxes=Math.max(0,ebt*d.taxRate);
  const netIncome=ebt-taxes;
  return{totalRevenue,grossProfit,totalOpEx,operatingIncome,ebt,taxes,netIncome};
}

function calcBalance(s){
  const d=s.data;
  const currentAssets=d.cash+d.accountsReceivable+d.inventory+d.prepaidExpenses;
  const fixedAssetsNet=d.propertyEquipment-d.accumulatedDeprec;
  const totalAssets=currentAssets+fixedAssetsNet+d.intangibles;
  const currentLiab=d.accountsPayable+d.shortTermDebt+d.accruedExpenses;
  const totalLiab=currentLiab+d.longTermDebt+d.deferredRevenue;
  const ni=calcIncome(s).netIncome;
  const equity=d.commonStock+(d.retainedEarnings+ni);
  const totalLiabEquity=totalLiab+equity;
  return{currentAssets,fixedAssetsNet,totalAssets,currentLiab,totalLiab,equity,totalLiabEquity};
}

function calcCashFlow(s){
  const ni=calcIncome(s).netIncome;
  const d=s.data;
  const operatingCF=ni+d.depreciation2+d.arChange+d.inventoryChange+d.apChange;
  const investingCF=d.capex+(d.investments||0);
  const financingCF=d.debtRepayment+(d.dividends||0);
  const netChange=operatingCF+investingCF+financingCF;
  const endingCash=d.cash+netChange;
  return{operatingCF,investingCF,financingCF,netChange,endingCash};
}

function fmt(n){return n>=0?'$'+Math.abs(n).toLocaleString():'($'+Math.abs(n).toLocaleString()+')';}
function fmtSign(n){return(n>=0?'+':'')+fmt(n);}

function getInVal(id){return parseFloat(document.getElementById(`in-${id}`)?.value)||0;}

function updateIncomeTotals(){
  const d=scenario.data;
  const ci=calcIncome(scenario);
  const totalRev=getInVal('salesRevenue')+getInVal('serviceRevenue');
  const grossP=totalRev-getInVal('cogs');
  const totalOpEx=getInVal('salariesWages')+getInVal('rentUtilities')+getInVal('marketingAdv')+getInVal('depreciation');
  const opInc=grossP-totalOpEx;
  const ebt=opInc-getInVal('interestExpense');
  const taxes=getInVal('taxes');
  const netInc=ebt-taxes;

  const set=(id,val,correct)=>{
    const el=document.getElementById(id);
    if(el){
      el.textContent=fmt(val);
      el.style.color=Math.round(val)===Math.round(correct)?'var(--green)':'var(--red)';
    }
  };
  set('total-revenue-display',totalRev,ci.totalRevenue);
  set('gross-profit-display',grossP,ci.grossProfit);
  set('total-opex-display',totalOpEx,ci.totalOpEx);
  set('op-income-display',opInc,ci.operatingIncome);
  set('ebt-display',ebt,ci.ebt);
  set('net-income-display',netInc,ci.netIncome);
}

function attachIncomeListeners(){
  document.querySelectorAll('input[type=number]').forEach(el=>{

function checkAndAdvanceIncome(){
  const d=scenario.data;

  const fields=[
    {id:'salesRevenue',correct:d.salesRevenue},
    {id:'serviceRevenue',correct:d.serviceRevenue},
    {id:'cogs',correct:d.cogs},
    {id:'salariesWages',correct:d.salariesWages},
    {id:'rentUtilities',correct:d.rentUtilities},
    {id:'marketingAdv',correct:d.marketingAdv},
    {id:'depreciation',correct:d.depreciation},
    {id:'interestExpense',correct:d.interestExpense},
    {id:'taxes',correct:Math.round(Math.max(0,ci.ebt)*d.taxRate)},
  ];
  let errors=0;
  fields.forEach(f=>{
    const input=document.getElementById(`in-${f.id}`);
    if(!input)return;
    const val=parseFloat(input.value)||0;
    const ok=Math.abs(val-f.correct)<1;
    input.className=ok?'correct':'incorrect';
    if(!ok)errors++;
  });
  if(errors>0){
    alert(`${errors} value(s) are incorrect. Check the highlighted fields — refer to the correct amounts in the right column.`);
    return;
  }
  incomeData=fields.reduce((o,f)=>{o[f.id]=f.correct;return o;},{});
  phase=2;renderApp();
}

function balRow(id,name,correctVal,tip){
  return`<tr>

}
function balRowCalc(id,name,val,tip){
  return`<tr>
    <td><div class="item-name" style="font-size:.82rem">${name} <span class="item-tooltip" data-tip="${tip}">ℹ️</span></div></td>
    <td class="amount"><input type="number" id="bal-${id}" placeholder="$0" value="${Math.round(val)}" oninput="updateBalanceTotals()" style="background:var(--greenl)"></td>
  </tr>`;
}

function getBVal(id){return parseFloat(document.getElementById(`bal-${id}`)?.value)||0;}

function updateBalanceTotals(){
  const s=scenario;const d=s.data;
  const totalCA=getBVal('cash')+getBVal('accountsReceivable')+getBVal('inventory')+getBVal('prepaidExpenses');
  const totalFA=getBVal('propertyEquipment')+getBVal('accumulatedDeprec')+getBVal('intangibles');
  const totalAssets=totalCA+totalFA;
  const totalCL=getBVal('accountsPayable')+getBVal('shortTermDebt')+getBVal('accruedExpenses');
  const totalLiab=totalCL+getBVal('longTermDebt')+getBVal('deferredRevenue');
  const totalEquity=getBVal('commonStock')+getBVal('retainedEarnings');
  const totalLE=totalLiab+totalEquity;
  const balanced=Math.abs(totalAssets-totalLE)<2;

  const setText=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=fmt(val);};
  setText('total-current-assets',totalCA);
  setText('total-fixed-assets',totalFA);
  setText('total-assets-display',totalAssets);
  setText('total-current-liab',totalCL);
  setText('total-liab-display',totalLiab);
  setText('total-equity-display',totalEquity);
  setText('total-liab-equity-display',totalLE);

  document.getElementById('bc-assets').textContent=fmt(totalAssets);
  document.getElementById('bc-liab').textContent=fmt(totalLiab);
  document.getElementById('bc-equity').textContent=fmt(totalEquity);
  const statusEl=document.getElementById('bc-status');
  if(statusEl){
    statusEl.textContent=balanced?'✓ Balanced!':'⚠ Does Not Balance — difference: '+fmt(Math.abs(totalAssets-totalLE));
    statusEl.className='bc-status '+(balanced?'balanced':'unbalanced');
  }
  const btn=document.getElementById('balance-advance-btn');
  if(btn)btn.disabled=!balanced;
}

function attachBalanceListeners(){
  document.querySelectorAll('input[type=number]').forEach(el=>el.addEventListener('input',updateBalanceTotals));
}

function checkAndAdvanceBalance(){
  const s=scenario;const d=s.data;
  const cb=calcBalance(s);
  const ci=calcIncome(s);
  const fields=[
    {id:'cash',correct:d.cash},{id:'accountsReceivable',correct:d.accountsReceivable},
    {id:'inventory',correct:d.inventory},{id:'prepaidExpenses',correct:d.prepaidExpenses},
    {id:'propertyEquipment',correct:d.propertyEquipment},{id:'accumulatedDeprec',correct:-d.accumulatedDeprec},
    {id:'intangibles',correct:d.intangibles},{id:'accountsPayable',correct:d.accountsPayable},
    {id:'shortTermDebt',correct:d.shortTermDebt},{id:'accruedExpenses',correct:d.accruedExpenses},
    {id:'longTermDebt',correct:d.longTermDebt},{id:'deferredRevenue',correct:d.deferredRevenue},
    {id:'commonStock',correct:d.commonStock},
  ];
  let errors=0;
  fields.forEach(f=>{
    const input=document.getElementById(`bal-${f.id}`);
    if(!input)return;
    const val=parseFloat(input.value)||0;
    if(Math.abs(val-f.correct)>1)errors++;
  });
  if(errors>0){alert(`${errors} value(s) need adjustment. The balance check passes when all values are correct and Assets = Liabilities + Equity.`);return;}
  balanceData=fields.reduce((o,f)=>{o[f.id]=f.correct;return o;},{});
  phase=3;renderApp();
}

function getCFVal(id){return parseFloat(document.getElementById(`cf-${id}`)?.value)||0;}

function updateCFTotals(){
  const s=scenario;const d=s.data;const cf=calcCashFlow(s);
  const opCF=getCFVal('netIncome')+getCFVal('depreciation2')+getCFVal('arChange')+getCFVal('inventoryChange')+getCFVal('apChange');
  const invCF=getCFVal('capex')+(d.investments!==0?getCFVal('investments'):d.investments);
  const finCF=getCFVal('debtRepayment')+(d.dividends!==0?getCFVal('dividends'):d.dividends);
  const netChange=opCF+invCF+finCF;
  const endingCash=d.cash+netChange;

  const setVal=(id,val,correct)=>{
    const el=document.getElementById(id);
    if(el){el.textContent=fmt(val);el.style.color=Math.abs(val-correct)<1?'var(--green)':'var(--red)';}
  };
  setVal('cf-operating-total',opCF,cf.operatingCF);
  setVal('cf-investing-total',invCF,cf.investingCF);
  setVal('cf-financing-total',finCF,cf.financingCF);
  setVal('cf-net-change',netChange,cf.netChange);
  setVal('cf-ending-cash',endingCash,cf.endingCash);
}

    {id:'debtRepayment',correct:d.debtRepayment},

  if(d.investments!==0)fields.push({id:'investments',correct:d.investments});
  if(d.dividends!==0)fields.push({id:'dividends',correct:d.dividends});

  let errors=0;
  fields.forEach(f=>{

  if(errors>0){alert(`${errors} cash flow item(s) are incorrect. Remember: cash outflows should be negative numbers.`);return;}
  cashFlowData=fields.reduce((o,f)=>{o[f.id]=f.correct;return o;},{});

function ratioCard(label,val,status,desc){

    }
  }
  analysisData={aq1:document.getElementById('aq1').value.trim(),aq2:document.getElementById('aq2').value.trim(),aq3:document.getElementById('aq3').value.trim(),aq4:document.getElementById('aq4').value.trim()};
  phase=5;renderApp();
}

// ── PHASE 5: FEEDBACK ──
async function renderFeedback(){

  const ci=calcIncome(s);const cb=calcBalance(s);const cf=calcCashFlow(s);

  document.getElementById('app').innerHTML=`
  <header>

    <div class="hphases" id="hphases"></div>
    <div class="hright">
      <div class="hstat"><div class="hstat-label">Phase</div><div class="hstat-val" style="color:#81C784" id="h-phase">Complete</div></div>

  <div class="layout">

      <div><div class="sb-label">Final Numbers</div><div class="key-numbers" id="sb-numbers"></div></div>
    </div>
    <div class="main">

        <div class="fb-header">

          <div>

              <div style="font-weight:700;color:var(--blue);margin-bottom:.4rem">📊 Income Statement</div>
              Revenue: ${fmt(ci.totalRevenue)}<br>Gross Profit: ${fmt(ci.grossProfit)}<br>Net Income: <span style="font-weight:700;color:green">${fmt(ci.netIncome)}</span>
            </div>
            <div style="background:var(--phase2l);border:1px solid var(--greenm);border-radius:var(--radius-sm);padding:.85rem">
              <div style="font-weight:700;color:var(--green);margin-bottom:.4rem">⚖️ Balance Sheet</div>
              Total Assets: ${fmt(cb.totalAssets)}<br>Total Liabilities: ${fmt(cb.totalLiab)}<br>Owner's Equity: <span id="fb-equity-span">${fmt(cb.equity)}</span>
            </div>
            <div style="background:var(--phase3l);border:1px solid var(--purplem);border-radius:var(--radius-sm);padding:.85rem">
              <div style="font-weight:700;color:var(--purple);margin-bottom:.4rem">💸 Cash Flow</div>
              Operating CF: <span id="fb-cf-span">${fmt(cf.operatingCF)}</span><br>Net Change: ${fmt(cf.netChange)}<br>Ending Cash: ${fmt(cf.endingCash)}
            </div>
          </div>
        </div>
      </div>
      <div class="btn-row" style="margin-top:.75rem">
        <button class="btn btn-outline" onclick="phase=0;scenario=null;renderApp()">🔄 Try Another Company</button>
        <button class="btn btn-primary" onclick="window.print()">🖨️ Print / Save PDF</button>
      </div>
    </div>
  </div>`;
  buildHeader();buildSidebar();

  const gpMargin=((ci.grossProfit/ci.totalRevenue)*100).toFixed(1);
  const netMargin=((ci.netIncome/ci.totalRevenue)*100).toFixed(1);
  const debtRatio=(cb.totalLiab/cb.totalAssets*100).toFixed(1);
  const currentRatio=(cb.currentAssets/cb.currentLiab).toFixed(2);
  const roi=((ci.netIncome/cb.totalAssets)*100).toFixed(1);

  const systemPrompt=`You are a demanding but fair financial analysis professor reviewing a high school student's financial statement analysis for Utah Business Management Strand 5. Hold work to real professional standards. Students who cannot interpret financial statements will struggle in any business career.

SCORING — strict:
- "Great" = correctly calculated ratios, used financial vocabulary accurately, drew logical conclusions from the data
- "OK" = correct direction but missing depth, incomplete vocabulary, or weak connections between statements
- "Needs Work" = incorrect calculations, misunderstood what a ratio means, or conclusions not supported by the data

Start with EXACTLY:
SCORES: Income Statement Analysis:[Great/OK/Needs Work] | Balance Sheet Analysis:[Great/OK/Needs Work] | Cash Flow Analysis:[Great/OK/Needs Work] | Management Decision:[Great/OK/Needs Work] | Overall Financial Literacy:[Great/OK/Needs Work]

Then 4 paragraphs:
1. Evaluate profitability analysis — did they correctly calculate and interpret gross margin (${gpMargin}%) and net margin (${netMargin}%)? Did they use vocabulary: revenue, COGS, gross profit, operating expenses, net income? Quote their actual words.
2. Evaluate liquidity/solvency analysis — did they correctly interpret the current ratio (${currentRatio}x) and debt ratio (${debtRatio}%)? Did they explain what these mean for the company's ability to pay bills and survive?
3. Evaluate cash flow analysis — did they understand WHY net income (${fmt(ci.netIncome)}) differs from operating cash flow (${fmt(cf.operatingCF)})? Depreciation adding back, working capital changes? This is the hardest concept — be specific about whether they got it.
4. Evaluate the management decision — was it supported by specific data? Did they reference at least 3 numbers? Was the recommendation logically consistent with what the numbers show?

End with one specific challenge: identify the weakest analysis and give them a concrete example of what a stronger answer would look like. Students are preparing for real business careers. No markdown ** or ##.`;

  const userPrompt=`Student Financial Analysis — ${s.name} (${s.type})

COMPANY FINANCIALS:
Income Statement: Revenue=${fmt(ci.totalRevenue)}, Gross Profit=${fmt(ci.grossProfit)} (${gpMargin}%), Net Income=${fmt(ci.netIncome)} (${netMargin}%)
Balance Sheet: Total Assets=${fmt(cb.totalAssets)}, Total Liabilities=${fmt(cb.totalLiab)}, Equity=${fmt(cb.equity)}, Current Ratio=${currentRatio}x, Debt Ratio=${debtRatio}%
Cash Flow: Operating CF=${fmt(cf.operatingCF)}, Investing CF=${fmt(calcCashFlow(s).investingCF)}, Net Change=${fmt(cf.netChange)}, Ending Cash=${fmt(cf.endingCash)}

STUDENT ANALYSIS:
Q1 (Profitability): "${analysisData.aq1}"
Q2 (Liquidity/Solvency): "${analysisData.aq2}"
Q3 (Cash vs Profit): "${analysisData.aq3}"

  try{
    const res=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},

    const sm=text.match(/SCORES:(.+)/);
    let main=text;
    if(sm){
      main=main.replace(sm[0],'').trim();
      document.getElementById('score-row').innerHTML=sm[1].split('|').map(p=>{
        const[lbl,rat]=p.split(':').map(s=>s.trim());
        const cls=rat==='Great'?'great':rat==='OK'?'ok':'needs';
        return`<span class="sc ${cls}">${lbl}: ${rat}</span>`;
      }).join('');
    }
    document.getElementById('fb-body').textContent=main;
  }catch(err){
    document.getElementById('fb-body').textContent='Connection error: '+err.message;
  }
}

renderSelect();
</script>
