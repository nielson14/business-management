<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethics & Compliance Simulator – Business Management</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F2F0EC;--surface:#FFFFFF;--surface2:#EDEAE4;--surface3:#E4E0D8;
  --border:#D4D0C8;--text:#1C1A16;--text-muted:#6C6860;--text-dim:#ACA89E;
  --ink:#1C1A16;
  --osha:#B71C1C;--oshal:#FFEBEE;
  --eeoc:#0D47A1;--eeoal:#E3F2FD;
  --ftc:#1B5E20;--ftcl:#E8F5E9;
  --ada:#4A148C;--adal:#F3E5F5;
  --ethics:#E65100;--ethicsl:#FFF3E0;
  --hr:#004D40;--hrl:#E0F2F1;
  --green:#2E7D32;--greenl:#E8F5E9;--greenm:rgba(46,125,50,.2);
  --red:#C62828;--redl:#FFEBEE;--redm:rgba(198,40,40,.2);
  --amber:#E65100;--amberl:#FFF3E0;--amberm:rgba(230,81,0,.2);
  --radius:12px;--radius-sm:7px;
  --serif:'Lora',serif;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--ink);color:#F2F0EC;padding:0;display:flex;align-items:stretch;position:sticky;top:0;z-index:100;}
.hbrand{padding:1rem 1.75rem;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;justify-content:center;flex-shrink:0;}
.hbrand h1{font-family:var(--serif);font-size:1.2rem;font-weight:700;color:#F2F0EC;letter-spacing:-.2px;}
.hbrand .sub{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(242,240,236,.35);margin-top:.25rem;}
.hscenarios{display:flex;flex:1;overflow:hidden;}
.hsc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.5rem .4rem;border-right:1px solid rgba(255,255,255,.06);font-size:.58rem;color:rgba(242,240,236,.25);cursor:default;transition:all .2s;gap:.15rem;min-width:0;}
.hsc.active{background:rgba(255,255,255,.07);color:#F2F0EC;}
.hsc.done{color:rgba(100,200,120,.7);}
.hsc.wrong{color:rgba(239,154,154,.7);}
.hsc-num{font-size:.65rem;font-weight:700;}
.hsc-name{font-size:.55rem;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
.hright{padding:.75rem 1.5rem;border-left:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:1.25rem;flex-shrink:0;}
.hstat{text-align:center;}
.hstat-label{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(242,240,236,.3);}
.hstat-val{font-family:var(--serif);font-size:.95rem;font-weight:700;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 60px);}
.sidebar{background:var(--ink);color:#F2F0EC;padding:1.25rem;display:flex;flex-direction:column;gap:1.5rem;border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;}
.main{padding:1.75rem;overflow-y:auto;}
.sb-label{font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(242,240,236,.25);margin-bottom:.65rem;}

/* COMPLIANCE SCORECARD */
.scorecard{display:flex;flex-direction:column;gap:.35rem;}
.sc-row{display:flex;align-items:center;gap:.65rem;padding:.5rem .65rem;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,.06);}
.sc-row.correct{background:rgba(46,125,50,.15);border-color:rgba(46,125,50,.3);}
.sc-row.wrong{background:rgba(198,40,40,.15);border-color:rgba(198,40,40,.3);}
.sc-row.pending{background:rgba(255,255,255,.03);}
.sc-badge{font-size:.6rem;font-weight:700;padding:.15rem .45rem;border-radius:2px;letter-spacing:.04em;flex-shrink:0;}
.sc-scenario{font-size:.68rem;color:rgba(242,240,236,.5);}
.sc-row.correct .sc-scenario{color:rgba(100,200,120,.8);}
.sc-row.wrong .sc-scenario{color:rgba(239,154,154,.7);}
.sc-result{margin-left:auto;font-size:.7rem;}

/* LAW REFERENCE */
.law-ref{display:flex;flex-direction:column;gap:.35rem;}
.law-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius-sm);padding:.55rem .7rem;}
.law-name{font-size:.72rem;font-weight:700;margin-bottom:.15rem;}
.law-desc{font-size:.6rem;color:rgba(242,240,236,.4);line-height:1.35;}

/* ROLE CARD */
.role-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);padding:.85rem;display:flex;align-items:center;gap:.75rem;}
.role-avatar{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.role-title{font-size:.82rem;font-weight:600;color:#F2F0EC;}
.role-company{font-size:.62rem;color:rgba(242,240,236,.4);}

/* MAIN CONTENT */
.scenario-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem;animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sc-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:1rem;}
.sc-num-big{font-family:var(--serif);font-size:3rem;font-weight:700;line-height:1;flex-shrink:0;width:52px;}
.sc-title-area{}
.sc-category{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:.35rem;}
.sc-title{font-family:var(--serif);font-size:1.45rem;font-weight:700;line-height:1.2;margin-bottom:.35rem;}
.sc-setting{font-size:.78rem;color:var(--text-muted);line-height:1.5;}
.sc-badge-right{margin-left:auto;flex-shrink:0;}
.urgency-badge{font-size:.65rem;font-weight:700;padding:.28rem .75rem;border-radius:100px;letter-spacing:.04em;}

/* CHARACTERS */
.characters{padding:.85rem 1.5rem;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;gap:.75rem;flex-wrap:wrap;}
.character-tag{display:flex;align-items:center;gap:.45rem;padding:.35rem .7rem;background:var(--surface);border:1px solid var(--border);border-radius:100px;font-size:.72rem;}
.char-emoji{font-size:.88rem;}
.char-name{font-weight:600;}
.char-role{color:var(--text-muted);}

/* SCENARIO BODY */
.sc-body{padding:1.5rem;border-bottom:1px solid var(--border);}
.sc-body-label{font-size:.62rem;letter-spacing:.13em;text-transform:uppercase;color:var(--text-dim);font-weight:600;margin-bottom:.65rem;}
.sc-narrative{font-size:.88rem;line-height:1.75;color:var(--text);}
.sc-quote{margin:1rem 0;padding:.85rem 1.1rem;border-left:3px solid;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-family:var(--serif);font-size:.95rem;font-style:italic;}
.key-fact{display:inline-flex;align-items:center;gap:.4rem;margin-top:.75rem;padding:.35rem .75rem;background:var(--surface2);border-radius:100px;font-size:.75rem;color:var(--text-muted);font-weight:500;}

/* DECISION AREA */
.decision-area{padding:1.5rem;}
.decision-label{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.85rem;}

/* AGENCY SELECTOR */
.agency-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;margin-bottom:1.25rem;}
.agency-opt{padding:.65rem .5rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;text-align:center;}
.agency-opt:hover{border-color:var(--text-muted);}
.agency-opt.selected{border-width:2px;}
.agency-icon{font-size:1.2rem;margin-bottom:.25rem;}
.agency-name{font-size:.72rem;font-weight:700;margin-bottom:.1rem;}
.agency-full{font-size:.58rem;color:var(--text-muted);line-height:1.3;}

/* ACTION SELECTOR */
.action-opts{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.25rem;}
.action-opt{display:flex;align-items:flex-start;gap:.75rem;padding:.85rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;}
.action-opt:hover{border-color:var(--text-muted);}
.action-opt.selected{border-color:var(--ink);background:var(--surface2);}
.action-letter{width:26px;height:26px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;margin-top:.05rem;color:var(--text-muted);transition:all .15s;}
.action-opt.selected .action-letter{background:var(--ink);border-color:var(--ink);color:#F2F0EC;}
.action-text{flex:1;font-size:.85rem;line-height:1.5;}

/* REASONING */
.reasoning-area{}
.reason-label{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem;display:flex;justify-content:space-between;align-items:baseline;}
.reason-hint{font-size:.62rem;color:var(--text-dim);font-weight:400;letter-spacing:0;text-transform:none;}
textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.75rem .9rem;font-family:var(--sans);font-size:.85rem;color:var(--text);resize:vertical;min-height:85px;outline:none;line-height:1.65;transition:border-color .15s;}
textarea:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(28,26,22,.08);}
textarea::placeholder{color:var(--text-dim);}

/* CONSEQUENCE CARD */
.consequence{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-top:1.25rem;animation:fadeUp .3s ease;}
.con-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.85rem;}
.con-icon{font-size:1.4rem;}
.con-title{font-weight:700;font-size:.95rem;}
.con-correct{font-size:.7rem;padding:.22rem .65rem;border-radius:100px;margin-left:auto;font-weight:700;}
.con-text{font-size:.84rem;line-height:1.7;color:var(--text-muted);margin-bottom:.85rem;}
.con-law-box{padding:.75rem 1rem;border-radius:var(--radius-sm);font-size:.8rem;line-height:1.55;border-left:4px solid;}
.con-law-title{font-weight:700;margin-bottom:.25rem;}

/* INTRO SCREEN */
.intro-screen{max-width:680px;margin:2.5rem auto;padding:2rem;}
.intro-logo{text-align:center;font-size:3.5rem;margin-bottom:1rem;}
.intro-title{font-family:var(--serif);font-size:2rem;font-weight:700;text-align:center;margin-bottom:.5rem;letter-spacing:-.5px;}
.intro-sub{text-align:center;color:var(--text-muted);line-height:1.65;margin-bottom:1.75rem;font-size:.9rem;}
.intro-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;}
.intro-card-title{font-family:var(--serif);font-size:.95rem;font-weight:700;margin-bottom:.65rem;display:flex;align-items:center;gap:.5rem;}
.law-preview-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;}
.law-preview-item{display:flex;align-items:flex-start;gap:.5rem;padding:.5rem .65rem;background:var(--surface2);border-radius:var(--radius-sm);font-size:.78rem;}
.law-preview-badge{font-size:.65rem;font-weight:700;padding:.15rem .45rem;border-radius:3px;flex-shrink:0;margin-top:.05rem;}

/* FINAL REPORT */
.final-report{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem;}
.fr-header{background:var(--ink);color:#F2F0EC;padding:1.5rem;display:flex;align-items:center;gap:1rem;}
.fr-title{font-family:var(--serif);font-size:1.4rem;font-weight:700;}
.fr-sub{font-size:.65rem;color:rgba(242,240,236,.4);letter-spacing:.08em;text-transform:uppercase;}
.fr-score{font-family:var(--serif);font-size:2.5rem;font-weight:700;margin-left:auto;}
.fr-body{padding:1.5rem;}
.verdict-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.5rem;}
.verdict-box{text-align:center;padding:1rem;border-radius:var(--radius-sm);border:1.5px solid transparent;}
.verdict-val{font-family:var(--serif);font-size:1.8rem;font-weight:700;margin-bottom:.2rem;}
.verdict-label{font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.scenario-review{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem;}
.sr-row{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 1rem;border-radius:var(--radius-sm);font-size:.82rem;border:1px solid transparent;}
.sr-row.correct-row{background:var(--greenl);border-color:var(--greenm);}
.sr-row.wrong-row{background:var(--redl);border-color:var(--redm);}
.sr-icon{font-size:1rem;flex-shrink:0;margin-top:.05rem;}
.sr-content{flex:1;}
.sr-title{font-weight:700;margin-bottom:.2rem;}
.sr-detail{font-size:.75rem;color:var(--text-muted);line-height:1.4;}

/* FEEDBACK */
.feedback-section{border-top:1px solid var(--border);padding-top:1.5rem;margin-top:.5rem;}
.fb-label{font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.85rem;}
.score-row{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1.1rem;}
.sc{font-size:.67rem;font-weight:700;padding:.27rem .75rem;border-radius:100px;}
.sc.great{background:var(--greenl);color:var(--green);border:1px solid var(--greenm);}
.sc.ok{background:var(--amberl);color:var(--amber);border:1px solid var(--amberm);}
.sc.needs{background:var(--redl);color:var(--red);border:1px solid var(--redm);}
.fb-text{font-size:.87rem;line-height:1.85;color:var(--text);white-space:pre-wrap;}

.typing-dot{display:inline-block;width:6px;height:6px;background:var(--ink);border-radius:50%;animation:blink 1.2s infinite;margin:0 2px;vertical-align:middle;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}

/* BUTTONS */
.btn{font-family:var(--sans);font-size:.86rem;font-weight:600;padding:.65rem 1.5rem;border-radius:var(--radius-sm);border:none;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--ink);color:#F2F0EC;}
.btn-primary:hover{background:#333;transform:translateY(-1px);}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border);}
.btn-outline:hover{border-color:var(--text-muted);}
.btn-row{display:flex;gap:.65rem;align-items:center;flex-wrap:wrap;margin-top:1.25rem;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .agency-grid{grid-template-columns:repeat(2,1fr);}
  .verdict-grid,.law-preview-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const WORKER_URL="https://digitalmarketing.robert-nielson14.workers.dev";

// ── AGENCIES ──
const AGENCIES=[
  {id:'osha',name:'OSHA',full:'Occupational Safety & Health Administration',icon:'⛑️',color:'#B71C1C',bg:'#FFEBEE',desc:'Workplace safety and health standards'},
  {id:'eeoc',name:'EEOC',full:'Equal Employment Opportunity Commission',icon:'⚖️',color:'#0D47A1',bg:'#E3F2FD',desc:'Prevents discrimination in employment'},
  {id:'ftc',name:'FTC',full:'Federal Trade Commission',icon:'🛡️',color:'#1B5E20',bg:'#E8F5E9',desc:'Prevents unfair business practices and fraud'},
  {id:'ada',name:'ADA',full:'Americans with Disabilities Act',icon:'♿',color:'#4A148C',bg:'#F3E5F5',desc:'Protects rights of people with disabilities'},
  {id:'flsa',name:'FLSA',full:'Fair Labor Standards Act',icon:'💰',color:'#004D40',bg:'#E0F2F1',desc:'Sets minimum wage, overtime, and child labor rules'},
  {id:'hipaa',name:'HIPAA',full:'Health Insurance Portability & Accountability Act',icon:'🏥',color:'#1A237E',bg:'#E8EAF6',desc:'Protects medical information privacy'},
  {id:'ethics',name:'Code of Ethics',full:'Company Code of Ethics / Whistleblower',icon:'📋',color:'#E65100',bg:'#FFF3E0',desc:'Internal ethical standards and reporting obligations'},
  {id:'csr',name:'CSR',full:'Corporate Social Responsibility',icon:'🌱',color:'#33691E',bg:'#F1F8E9',desc:'Company obligations to society and environment'},
];

// ── SCENARIOS ──
const SCENARIOS=[
  {
    id:1,
    agencyId:'osha',
    category:'Workplace Safety',
    urgency:'HIGH',urgencyColor:'#B71C1C',urgencyBg:'#FFEBEE',
    title:'The Broken Scaffold',
    setting:'Apex Manufacturing — Warehouse & Production Floor',
    characters:[
      {emoji:'👷',name:'Marcus Rivera',role:'Warehouse worker — 3 years'},
      {emoji:'👔',name:'Plant Manager Cho',role:'Your supervisor'},
      {emoji:'⚖️',name:'You',role:'HR Compliance Officer'},
    ],
    narrative:'Marcus Rivera, a warehouse worker at Apex Manufacturing, has filed a formal complaint with your HR department. He reports that the scaffolding on the production floor has a cracked support beam that maintenance identified two weeks ago. A repair order was submitted, but Plant Manager Cho told the crew to keep using it because "the order is in the system and we\'re behind on orders."\n\nToday, Marcus slipped on a wet floor near the scaffold. He wasn\'t injured, but the near-miss scared him. He is now telling you that if you don\'t fix this, he is going to report it externally.',
    quote:'"I almost fell today. That scaffold should be shut down. If nobody fixes it in 48 hours, I\'m calling someone outside this company."',
    keyFact:'⚠️ The repair request was filed 14 days ago and the scaffold is still in active use',
    actions:[
      {id:'A',text:'Shut down the scaffold immediately, document the hazard, complete the repair, and file an internal incident report. Assure Marcus his complaint is protected under federal law.',correct:true},
      {id:'B',text:'Tell Marcus the repair order is already submitted and he should be patient — management is handling it.',correct:false},
      {id:'C',text:'Escalate to Plant Manager Cho and let him decide whether to shut it down.',correct:false},
      {id:'D',text:'Tell Marcus that if he files an external complaint he could face disciplinary action for going around internal channels.',correct:false},
    ],
    correctAgency:'osha',
    consequence:{
      correct:{icon:'✅',title:'Correct — OSHA Violation Prevented',text:'You correctly identified this as an OSHA violation and acted immediately. OSHA requires employers to maintain a hazard-free workplace under the General Duty Clause. By shutting down the scaffold and documenting the hazard, you protected both Marcus and the company. Retaliating against an employee for reporting a safety concern is also illegal under OSHA — warning D was not only wrong, it was itself a violation.',color:'var(--green)',bg:'var(--greenl)'},
      wrong:{icon:'❌',title:'Incorrect — OSHA Violation Occurred',text:'This situation required immediate corrective action under OSHA\'s General Duty Clause, which requires employers to provide a workplace free from recognized hazards. Options B and C both delay action on a known hazard. Option D constitutes illegal retaliation against an employee exercising their right to report a safety concern — this alone could result in an OSHA citation. The company now faces potential fines up to $15,625 per violation.',color:'var(--red)',bg:'var(--redl)'},
      law:'OSHA — General Duty Clause: Employers must provide a workplace free from recognized hazards that are causing or likely to cause death or serious physical harm. Retaliating against employees who report safety concerns is a federal crime.',
      lawColor:'#B71C1C',
    },
    placeholder:'Explain which law or regulation applies and why. What specific section or principle of OSHA is at stake here? Why are options B, C, and D problematic from a legal standpoint?',
  },
  {
    id:2,
    agencyId:'eeoc',
    category:'Employment Discrimination',
    urgency:'CRITICAL',urgencyColor:'#0D47A1',urgencyBg:'#E3F2FD',
    title:'The Overlooked Candidate',
    setting:'Horizon Financial Services — HR Department',
    characters:[
      {emoji:'👩🏾‍💼',name:'Denise Okafor',role:'External candidate — 8 yrs experience, MBA'},
      {emoji:'👨‍💼',name:'Hiring Manager Webb',role:'Department Director'},
      {emoji:'⚖️',name:'You',role:'HR Compliance Officer'},
    ],
    narrative:'Horizon Financial Services recently posted a Senior Analyst position. Denise Okafor, a Black woman with 8 years of experience and an MBA from a top-10 program, applied and was rated the top candidate by the interview panel — highest scores across all competencies.\n\nHowever, Hiring Manager Webb chose the second-ranked candidate, a white male with fewer qualifications. When you asked Webb to document his reasoning, he wrote: "Culture fit and communication style." No specific examples were provided.\n\nDenise has since contacted your department asking why she was not selected. She has also mentioned she is consulting an attorney.',
    quote:'"I was the most qualified candidate by every metric your own panel used. I deserve a real explanation."',
    keyFact:'📋 Denise scored highest on all 6 interview rubric categories — panel documentation on file',
    actions:[
      {id:'A',text:'Conduct an internal investigation, document all records, and require Webb to provide specific, objective, non-discriminatory reasons for his decision. If none exist, escalate to legal counsel and consider reversing the hiring decision.',correct:true},
      {id:'B',text:'Send Denise a standard rejection letter citing "a highly competitive candidate pool."',correct:false},
      {id:'C',text:'Tell Webb to add more specific notes to his documentation to justify the decision retroactively.',correct:false},
      {id:'D',text:'Settle the matter quickly by offering Denise a lower-level position to avoid a lawsuit.',correct:false},
    ],
    correctAgency:'eeoc',
    consequence:{
      correct:{icon:'✅',title:'Correct — EEOC Compliance Procedures Followed',text:'You correctly identified potential Title VII discrimination and initiated a proper internal investigation. "Culture fit" without objective criteria is a well-documented proxy for racial bias in hiring — courts have ruled on this repeatedly. Requiring specific, documented, objective reasons forces accountability. If Webb cannot provide them, the company may need to reconsider the decision to avoid an EEOC charge.',color:'var(--green)',bg:'var(--greenl)'},
      wrong:{icon:'❌',title:'Incorrect — Exposure to EEOC Complaint',text:'Option B ignores a documented potential violation. Option C is illegal document fabrication and would significantly worsen the company\'s legal position — tampering with records is a serious offense. Option D without proper process could be seen as admission of wrongdoing and may not protect the company. The company now has significant exposure to an EEOC charge and potential Title VII lawsuit.',color:'var(--red)',bg:'var(--redl)'},
      law:'EEOC — Title VII of the Civil Rights Act: Prohibits employment discrimination based on race, color, religion, sex, or national origin. "Culture fit" without objective criteria has been found by courts to be a pretext for discrimination.',
      lawColor:'#0D47A1',
    },
    placeholder:'Explain which law applies and what the legal standard is. Why is "culture fit" legally problematic as a hiring justification? What does Title VII require of employers in hiring decisions?',
  },
  {
    id:3,

// ── STATE ──
let currentScenario=0;
let selectedAgency=null;
let selectedAction=null;
let showingConsequence=false;

let agencyCounts={correct:0,wrong:0};

// ── HELPERS ──
function buildHeader(){
  const el=document.getElementById('hscenarios');
  if(!el)return;
  el.innerHTML=SCENARIOS.map((s,i)=>{
    const d=decisions[i];
    const cls=d===undefined?'':d.agencyCorrect&&d.actionCorrect?'done':'wrong';
    return`<div class="hsc ${currentScenario===i?'active':''} ${cls}" id="hsc-${i}">
      <div class="hsc-num">${d===undefined?i+1:d.agencyCorrect&&d.actionCorrect?'✓':'✗'}</div>
      <div class="hsc-name">${s.category}</div>
    </div>`;
  }).join('');
  const sv=document.getElementById('h-score');
  if(sv)sv.textContent=agencyCounts.correct+'/'+SCENARIOS.length;
  const sc=document.getElementById('h-scenario');
  if(sc)sc.textContent=currentScenario<SCENARIOS.length?'Scenario '+(currentScenario+1):'Complete';
}

function buildSidebar(){
  // Scorecard
  const el=document.getElementById('sb-scorecard');
  if(el){
    el.innerHTML=SCENARIOS.map((s,i)=>{
      const d=decisions[i];
      const cls=d===undefined?'pending':d.agencyCorrect&&d.actionCorrect?'correct':'wrong';
      return`<div class="sc-row ${cls}" id="scrow-${i}">
        <span class="sc-badge" style="background:${AGENCIES.find(a=>a.id===s.agencyId)?.bg};color:${AGENCIES.find(a=>a.id===s.agencyId)?.color}">${AGENCIES.find(a=>a.id===s.agencyId)?.name||''}</span>
        <span class="sc-scenario">${s.category}</span>
        <span class="sc-result">${d===undefined?'—':d.agencyCorrect&&d.actionCorrect?'✓ Correct':'✗ Wrong'}</span>
      </div>`;
    }).join('');
  }
}

function startSim(){currentScenario=0;selectedAgency=null;selectedAction=null;showingConsequence=false;decisions=[];agencyCounts={correct:0,wrong:0};renderScenario();}

// ── RENDER SCENARIO ──

  selectedAgency=null;selectedAction=null;showingConsequence=false;

  document.getElementById('app').innerHTML=`

function selectAgency(id){
  selectedAgency=id;
  document.querySelectorAll('.agency-opt').forEach(el=>{
    const aid=el.id.replace('ag-','');
    const a=AGENCIES.find(x=>x.id===aid);
    el.classList.toggle('selected',aid===id);
    el.style.borderColor=aid===id?a.color:'';
    el.style.background=aid===id?a.bg:'';
    el.querySelector('.agency-name').style.color=aid===id?a.color:'';
  });
}

function selectAction(id){
  selectedAction=id;
  document.querySelectorAll('.action-opt').forEach(el=>{
    const aid=el.id.replace('act-','');
    el.classList.toggle('selected',aid===id);
    const letter=el.querySelector('.action-letter');
    if(letter){letter.style.background=aid===id?'var(--ink)':'';letter.style.borderColor=aid===id?'var(--ink)':'';letter.style.color=aid===id?'#F2F0EC':'';}
  });
}

function submitScenario(){
  const sc=SCENARIOS[currentScenario];
  const reasoning=document.getElementById('reasoning')?.value.trim();
  if(!selectedAgency){alert('Please select which law or agency applies.');return;}
  if(!selectedAction){alert('Please select a course of action.');return;}
  if(!reasoning||reasoning.length<30){document.getElementById('reasoning').style.borderColor='var(--red)';alert('Please explain your legal reasoning before submitting.');return;}

  const agencyCorrect=selectedAgency===sc.correctAgency;
  const correctAction=sc.actions.find(a=>a.correct);
  const actionCorrect=selectedAction===correctAction.id;
  const bothCorrect=agencyCorrect&&actionCorrect;

  decisions[currentScenario]={agencyChosen:selectedAgency,actionChosen:selectedAction,agencyCorrect,actionCorrect,reasoning,scenarioTitle:sc.title,category:sc.category,correctAgency:sc.correctAgency,correctAction:correctAction.id};

  if(bothCorrect)agencyCounts.correct++;
  else agencyCounts.wrong++;

  buildHeader();buildSidebar();

  // Show consequence
  const con=sc.consequence;
  const isCorrect=bothCorrect;
  const chosenAgency=AGENCIES.find(a=>a.id===selectedAgency);
  const correctAgency=AGENCIES.find(a=>a.id===sc.correctAgency);

  const conHTML=`
  <div class="consequence">
    <div class="con-header">
      <div class="con-icon">${isCorrect?con.correct.icon:con.wrong.icon}</div>
      <div>
        <div class="con-title">${isCorrect?con.correct.title:con.wrong.title}</div>
        ${!agencyCorrect?`<div style="font-size:.72rem;color:var(--red);margin-top:.15rem">Agency: You chose ${chosenAgency?.name} — Correct: ${correctAgency?.name}</div>`:''}
        ${!actionCorrect?`<div style="font-size:.72rem;color:var(--red);margin-top:.1rem">Action: Correct answer was Option ${correctAction.id}</div>`:''}
      </div>
      <span class="con-correct" style="background:${isCorrect?'var(--greenl)':'var(--redl)'};color:${isCorrect?'var(--green)':'var(--red)'}">${isCorrect?'✓ Both Correct':'✗ Needs Work'}</span>
    </div>
    <div class="con-text">${isCorrect?con.correct.text:con.wrong.text}</div>
    <div class="con-law-box" style="border-color:${con.lawColor};background:${con.lawColor}10">
      <div class="con-law-title" style="color:${con.lawColor}">📋 The Law That Applies</div>
      ${con.law}
    </div>
    <div class="btn-row">
      ${currentScenario<SCENARIOS.length-1?
        `<button class="btn btn-primary" onclick="nextScenario()">Next Scenario →</button>`:
        `<button class="btn btn-primary" style="background:var(--green)" onclick="nextScenario()">See Final Report & AI Feedback →</button>`}
    </div>
  </div>`;

  const main=document.getElementById('scenario-main');
  if(main)main.insertAdjacentHTML('beforeend',conHTML);
  document.querySelector('.consequence')?.scrollIntoView({behavior:'smooth',block:'start'});
}

function nextScenario(){
  currentScenario++;
  if(currentScenario>=SCENARIOS.length)renderFinalReport();
  else renderScenario();
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack(){
  if(currentScenario>0){
    const d=decisions[currentScenario-1];
    if(d){if(d.agencyCorrect&&d.actionCorrect)agencyCounts.correct--;else agencyCounts.wrong--;}
    decisions.splice(currentScenario-1,1);
    currentScenario--;
    renderScenario();
  }
}

// ── FINAL REPORT ──
async function renderFinalReport(){
  buildHeader();
  const total=SCENARIOS.length;
  const correct=decisions.filter(d=>d.agencyCorrect&&d.actionCorrect).length;
  const agencyCorrect=decisions.filter(d=>d.agencyCorrect).length;
  const actionCorrect=decisions.filter(d=>d.actionCorrect).length;

  let rating='',ratingColor='',ratingBg='';
  if(correct>=5){rating='Outstanding Compliance Officer';ratingColor='var(--green)';ratingBg='var(--greenl)';}
  else if(correct>=3){rating='Competent — Needs Development';ratingColor='var(--amber)';ratingBg:'var(--amberl)';}
  else{rating='Significant Training Required';ratingColor='var(--red)';ratingBg='var(--redl)';}

  document.getElementById('app').innerHTML=`
  <header>
    <div class="hbrand"><h1>Ethics & Compliance Simulator</h1><div class="sub">Business Management · Strand 7</div></div>
    <div class="hscenarios" id="hscenarios"></div>
    <div class="hright">
      <div class="hstat"><div class="hstat-label">Final Score</div><div class="hstat-val" style="color:#81C784" id="h-score">${correct}/${total}</div></div>
      <div class="hstat"><div class="hstat-label">Status</div><div class="hstat-val" id="h-scenario">Complete</div></div>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div><div class="sb-label">Final Scorecard</div><div class="scorecard" id="sb-scorecard"></div></div>
      <div><div class="sb-label">Laws Covered</div>
        <div class="law-ref" id="sb-laws-final"></div>
      </div>
    </div>
    <div class="main">
      <div class="final-report">
        <div class="fr-header">
          <div class="fr-icon" style="font-size:2rem">⚖️</div>
          <div>
            <div class="fr-title">Compliance Officer Performance Report</div>
            <div class="fr-sub">Business Management · Strand 7 · Ethics & Legal Regulations</div>
          </div>
          <div class="fr-score" style="color:${correct>=5?'#81C784':correct>=3?'#FFD54F':'#EF9A9A'}">${correct}/${total}</div>
        </div>
        <div class="fr-body">
          <div style="text-align:center;padding:.85rem;border-radius:var(--radius-sm);margin-bottom:1.25rem;background:${ratingBg||'var(--surface2)'}">
            <div style="font-family:var(--serif);font-size:1.1rem;font-weight:700;color:${ratingColor}">${rating}</div>
          </div>
          <div class="verdict-grid">
            <div class="verdict-box" style="background:var(--greenl);border-color:var(--greenm)">
              <div class="verdict-val" style="color:var(--green)">${correct}</div>
              <div class="verdict-label" style="color:var(--green)">Fully Correct</div>
            </div>
            <div class="verdict-box" style="background:var(--bluel);border-color:var(--bluem)">
              <div class="verdict-val" style="color:#0D47A1">${agencyCorrect}</div>
              <div class="verdict-label" style="color:#0D47A1">Right Agency</div>
            </div>
            <div class="verdict-box" style="background:var(--redl);border-color:var(--redm)">
              <div class="verdict-val" style="color:var(--red)">${total-correct}</div>
              <div class="verdict-label" style="color:var(--red)">Incorrect</div>
            </div>
          </div>

          <div class="scenario-review">
            ${decisions.map((d,i)=>{
              const sc=SCENARIOS[i];
              const both=d.agencyCorrect&&d.actionCorrect;
              const chosenA=AGENCIES.find(a=>a.id===d.agencyChosen);
              const correctA=AGENCIES.find(a=>a.id===d.correctAgency);
              return`<div class="sr-row ${both?'correct-row':'wrong-row'}">
                <div class="sr-icon">${both?'✅':'❌'}</div>
                <div class="sr-content">
                  <div class="sr-title">${sc.title} — ${sc.category}</div>
                  <div class="sr-detail">Agency: ${d.agencyCorrect?'✓ '+chosenA?.name:'✗ You chose '+chosenA?.name+', correct: '+correctA?.name} · Action: ${d.actionCorrect?'✓ Option '+d.actionChosen:'✗ Option '+d.actionChosen+', correct: '+d.correctAction}</div>
                </div>
              </div>`;
            }).join('')}
          </div>

          <div class="feedback-section">
            <div class="fb-label">🏛️ Legal Compliance Advisor Review</div>
            <div class="score-row" id="score-row"></div>
            <div class="fb-text" id="fb-text"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
          </div>
        </div>
      </div>
      <div class="btn-row" style="margin-top:.75rem">
        <button class="btn btn-outline" onclick="renderIntro()">🔄 Run Again</button>
        <button class="btn btn-primary" onclick="window.print()">🖨️ Print Report</button>
      </div>
    </div>
  </div>`;
  buildHeader();buildSidebar();

  const decisionSummary=decisions.map((d,i)=>{
    const sc=SCENARIOS[i];
    const chosenA=AGENCIES.find(a=>a.id===d.agencyChosen)?.name||d.agencyChosen;
    const correctA=AGENCIES.find(a=>a.id===d.correctAgency)?.name||d.correctAgency;
    return`Scenario ${i+1} — "${sc.title}" (${sc.category}):
  Agency chosen: ${chosenA} | Correct: ${correctA} | ${d.agencyCorrect?'✓':'✗'}
  Action chosen: Option ${d.actionChosen} | Correct: Option ${d.correctAction} | ${d.actionCorrect?'✓':'✗'}
  Student reasoning: "${d.reasoning}"`;
  }).join('\n\n');

  const systemPrompt=`You are a demanding but fair legal compliance professor reviewing a high school student's performance on an ethics and compliance simulation for Utah Business Management Strand 7. Hold work to real professional standards. A compliance officer who does not know which law applies in a workplace crisis is a liability to their company.

SCORING:
- "Great" = correctly identified the law, chose the right action, AND explained the legal reasoning with specific principles
- "OK" = correct identification but weak or vague legal reasoning
- "Needs Work" = wrong law, wrong action, or reasoning that shows fundamental misunderstanding

Start with EXACTLY:
SCORES: Agency Identification:[Great/OK/Needs Work] | Action Selection:[Great/OK/Needs Work] | Legal Reasoning:[Great/OK/Needs Work] | Employee Rights Knowledge:[Great/OK/Needs Work] | Overall Compliance Acumen:[Great/OK/Needs Work]

Then 4 paragraphs:
1. Evaluate which laws they identified correctly vs incorrectly. Reference specific scenarios by name. A compliance officer who cannot distinguish OSHA from EEOC or ADA is not ready for the role.
2. Evaluate their action choices — did they choose actions that would actually protect the company and employees? Call out any choices that would themselves create violations (like retaliating against a whistleblower or transferring a harassment victim).
3. Evaluate the quality of their written legal reasoning across scenarios. Did they use specific law names, sections, or principles? Did they explain WHY the law applies — or just name it?
4. Overall assessment — which laws do they understand well, which do they need to study more? Which scenario showed their strongest and weakest understanding?

End with one specific study challenge: pick the law they struggled with most and give them a one-paragraph explanation of what they need to understand about it. No markdown ** or ##.`;

  const userPrompt=`Student Compliance Results:
Score: ${correct}/${total} correct (Agency correct: ${agencyCorrect}, Action correct: ${actionCorrect})

${decisionSummary}`;

  try{
    const res=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1400,
        messages:[{role:'user',content:systemPrompt+'\n\n'+userPrompt}]})});
    const data=await res.json();
    const text=data.content?.[0]?.text||'Could not generate feedback.';
    const sm=text.match(/SCORES:(.+)/);
    let main=text;
    if(sm){
      main=main.replace(sm[0],'').trim();
      document.getElementById('score-row').innerHTML=sm[1].split('|').map(p=>{
        const[lbl,rat]=p.split(':').map(s=>s.trim());
        const cls=rat==='Great'?'great':rat==='OK'?'ok':'needs';
        return`<span class="sc ${cls}">${lbl}: ${rat}</span>`;
      }).join('');
    }
    document.getElementById('fb-text').textContent=main;
  }catch(err){
    document.getElementById('fb-text').textContent='Connection error: '+err.message;
  }
}

renderIntro();
</script>
</body>
</html>
