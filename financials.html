<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Statements Simulator – Business Management</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0EEE8;--surface:#FFFFFF;--surface2:#F5F3EE;--surface3:#EAE8E2;
  --border:#D8D4CC;--text:#1A1916;--text-muted:#6A6560;--text-dim:#AAA89E;
  --ink:#1A1916;
  --green:#1B5E20;--greenl:#E8F5E9;--greenm:rgba(27,94,32,.2);
  --red:#B71C1C;--redl:#FFEBEE;--redm:rgba(183,28,28,.2);
  --blue:#0D47A1;--bluel:#E3F2FD;--bluem:rgba(13,71,161,.2);
  --amber:#E65100;--amberl:#FFF3E0;--amberm:rgba(230,81,0,.2);
  --purple:#4A148C;--purplel:#F3E5F5;--purplem:rgba(74,20,140,.2);
  --teal:#004D40;--teall:#E0F2F1;
  --radius:10px;--radius-sm:6px;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--ink);color:#F0EEE8;display:flex;align-items:stretch;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--green);}
.hbrand{padding:1rem 1.75rem;border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;justify-content:center;flex-shrink:0;}
.hbrand h1{font-family:var(--mono);font-size:1rem;font-weight:700;color:#F0EEE8;}
.hbrand .sub{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(240,238,232,.35);margin-top:.25rem;}
.hphases{display:flex;flex:1;}
.hphase{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.6rem .5rem;border-right:1px solid rgba(255,255,255,.06);font-size:.65rem;color:rgba(240,238,232,.3);cursor:default;transition:all .2s;gap:.15rem;}
.hphase.active{background:rgba(255,255,255,.06);color:#F0EEE8;}
.hphase.done{color:rgba(100,200,120,.7);}
.hphase-icon{font-size:1.1rem;}
.hphase-name{font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;}
.hright{padding:.75rem 1.5rem;border-left:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:1.25rem;flex-shrink:0;}
.hstat-label{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,238,232,.3);}
.hstat-val{font-family:var(--mono);font-size:.9rem;font-weight:700;color:#FFD54F;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 65px);}
.sidebar{background:var(--ink);color:#F0EEE8;padding:1.25rem;display:flex;flex-direction:column;gap:1.5rem;border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;}
.main{padding:1.75rem;overflow-y:auto;}
.sb-label{font-family:var(--mono);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(240,238,232,.25);margin-bottom:.65rem;}

/* SIDEBAR */
.company-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);padding:.9rem;}
.company-name{font-family:var(--mono);font-size:.9rem;font-weight:700;color:#F0EEE8;margin-bottom:.2rem;}
.company-type{font-size:.65rem;color:rgba(240,238,232,.4);}
.stmt-progress{display:flex;flex-direction:column;gap:.4rem;}
.sp-row{display:flex;align-items:center;gap:.6rem;padding:.5rem .6rem;border-radius:var(--radius-sm);border:1px solid transparent;transition:all .2s;}
.sp-row.active{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);}
.sp-row.done{opacity:.55;}
.sp-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sp-name{font-family:var(--mono);font-size:.72rem;color:rgba(240,238,232,.4);transition:color .2s;}
.sp-row.active .sp-name{color:#F0EEE8;}
.sp-check{margin-left:auto;font-size:.7rem;color:rgba(100,200,120,.8);}
.formula-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:.75rem;}
.formula-title{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,238,232,.3);margin-bottom:.5rem;}
.formula-line{font-family:var(--mono);font-size:.68rem;color:rgba(240,238,232,.6);line-height:1.7;}
.formula-line.hl{color:#FFD54F;}
.key-numbers{display:flex;flex-direction:column;gap:.4rem;}
.kn-row{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius-sm);padding:.5rem .65rem;display:flex;justify-content:space-between;align-items:center;}
.kn-label{font-size:.62rem;color:rgba(240,238,232,.4);}
.kn-val{font-family:var(--mono);font-size:.78rem;font-weight:600;}

/* DATA SHEET — the source of truth students work from */
.data-sheet{background:var(--surface);border:2px solid var(--blue);border-radius:var(--radius);margin-bottom:1.5rem;overflow:hidden;}
.ds-header{background:var(--bluel);padding:.85rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.65rem;}
.ds-icon{font-size:1.25rem;}
.ds-title{font-weight:700;font-size:.9rem;color:var(--blue);}
.ds-subtitle{font-size:.73rem;color:var(--text-muted);}
.ds-body{padding:1.1rem 1.25rem;}
.ds-intro{font-size:.8rem;color:var(--text-muted);line-height:1.6;margin-bottom:1rem;}
.ds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.4rem;}
.ds-item{display:flex;justify-content:space-between;align-items:center;padding:.4rem .65rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:.8rem;}
.ds-item-name{color:var(--text-muted);}
.ds-item-val{font-family:var(--mono);font-weight:700;font-size:.78rem;color:var(--text);}
.ds-item.used{opacity:.4;}
.ds-note{font-size:.72rem;color:var(--blue);margin-top:.75rem;font-style:italic;}

/* PHASE HEADER */
.phase-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:1rem;}
.ph-num{font-family:var(--mono);font-size:3rem;font-weight:700;line-height:1;flex-shrink:0;width:55px;}
.ph-title{font-size:1.4rem;font-weight:700;margin-bottom:.3rem;letter-spacing:-.3px;}
.ph-sub{font-size:.8rem;color:var(--text-muted);line-height:1.6;max-width:500px;}
.ph-badge{font-family:var(--mono);font-size:.58rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:.22rem .6rem;border-radius:2px;margin-left:auto;flex-shrink:0;}

/* FINANCIAL TABLE */
.fin-table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem;}
.ftc-header{padding:.85rem 1.25rem;border-bottom:1px solid var(--border);}
.ftc-title{font-family:var(--mono);font-size:.82rem;font-weight:700;}
.ftc-subtitle{font-size:.72rem;color:var(--text-muted);}
.fin-table{width:100%;border-collapse:collapse;}
.fin-table th{text-align:left;padding:.55rem 1rem;background:var(--surface2);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);}
.fin-table td{padding:.5rem 1rem;border-bottom:1px solid var(--border);font-size:.84rem;vertical-align:middle;}
.fin-table td.amount{font-family:var(--mono);font-size:.82rem;text-align:right;width:160px;}
.fin-table td.amount input{font-family:var(--mono);font-size:.82rem;text-align:right;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.35rem .6rem;width:130px;background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s;}
.fin-table td.amount input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(13,71,161,.1);}
.fin-table td.amount input.correct{border-color:var(--green);background:var(--greenl);}
.fin-table td.amount input.incorrect{border-color:var(--red);background:var(--redl);}
.fin-table tr.section-header td{background:var(--surface2);font-weight:700;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);padding:.4rem 1rem;}
.fin-table tr.subtotal td{background:var(--surface2);font-weight:700;border-top:2px solid var(--border);}
.fin-table tr.subtotal td.calc{font-family:var(--mono);color:var(--blue);}
.fin-table tr.total-row td{background:var(--ink);color:#F0EEE8;font-weight:700;font-size:.88rem;}
.fin-table tr.total-row td.calc{font-family:var(--mono);}
.fin-table tr.gp-row td{background:var(--greenl);color:var(--green);font-weight:700;border-top:2px solid var(--border);}
.fin-table tr.gp-row.neg td{background:var(--redl);color:var(--red);}
.fin-table tr.ni-row td{background:var(--ink);color:#F0EEE8;font-weight:700;font-size:.9rem;}
.item-name{display:flex;align-items:center;gap:.5rem;}
.tip{cursor:help;font-size:.75rem;color:var(--text-dim);position:relative;display:inline-block;}
.tip:hover::after{content:attr(data-tip);position:absolute;left:100%;top:50%;transform:translateY(-50%);background:var(--ink);color:#F0EEE8;font-size:.68rem;padding:.4rem .7rem;border-radius:var(--radius-sm);white-space:nowrap;margin-left:.4rem;z-index:20;max-width:240px;white-space:normal;line-height:1.4;pointer-events:none;}

/* BALANCE CHECKER */
.balance-check{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius-sm);padding:1rem 1.25rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;}
.bc-item{text-align:center;}
.bc-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.25rem;}
.bc-val{font-family:var(--mono);font-size:1.1rem;font-weight:700;}
.bc-op{font-family:var(--mono);font-size:1.4rem;color:var(--text-muted);}
.bc-status{font-size:.78rem;font-weight:700;padding:.35rem .85rem;border-radius:100px;}
.bc-status.balanced{background:var(--greenl);color:var(--green);}
.bc-status.unbalanced{background:var(--redl);color:var(--red);}

/* ANALYSIS */
.analysis-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1.25rem;}
.aq{margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
.aq:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.aq-num{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.3rem;}
.aq-q{font-size:.9rem;font-weight:600;margin-bottom:.5rem;line-height:1.4;}
.aq-data{font-family:var(--mono);font-size:.72rem;color:var(--text-muted);background:var(--surface2);padding:.5rem .75rem;border-radius:var(--radius-sm);margin-bottom:.5rem;line-height:1.6;}
textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.7rem .85rem;font-family:var(--sans);font-size:.84rem;color:var(--text);resize:vertical;min-height:85px;outline:none;line-height:1.6;transition:border-color .15s;}
textarea:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(13,71,161,.1);}
textarea::placeholder{color:var(--text-dim);}

/* RESULT REVEAL */
.result-row{display:flex;align-items:center;gap:.65rem;padding:.5rem .75rem;border-radius:var(--radius-sm);margin-bottom:.35rem;font-size:.82rem;}
.result-row.correct-row{background:var(--greenl);border:1px solid var(--greenm);}
.result-row.wrong-row{background:var(--redl);border:1px solid var(--redm);}
.result-icon{font-size:1rem;flex-shrink:0;}
.result-item{flex:1;}
.result-yours{font-family:var(--mono);font-size:.75rem;color:var(--text-muted);}
.result-correct{font-family:var(--mono);font-size:.75rem;font-weight:700;}

/* SCENARIO SELECTOR */
.scenario-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem;}
.sc-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:1.25rem;cursor:pointer;transition:all .2s;}
.sc-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.08);}
.sc-card.selected{border-color:var(--blue);background:var(--bluel);}
.sc-emoji{font-size:2rem;margin-bottom:.5rem;}
.sc-name{font-weight:700;font-size:.95rem;margin-bottom:.25rem;}
.sc-type{font-family:var(--mono);font-size:.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;}
.sc-desc{font-size:.75rem;color:var(--text-muted);line-height:1.45;}
.sc-health{display:flex;gap:.4rem;margin-top:.75rem;flex-wrap:wrap;}
.sc-pill{font-size:.62rem;font-weight:600;padding:.15rem .5rem;border-radius:100px;}

/* FEEDBACK */
.feedback-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.fb-header{background:var(--ink);color:#F0EEE8;padding:1.1rem 1.5rem;display:flex;align-items:center;gap:.85rem;}
.fb-icon{font-size:1.6rem;}
.fb-title{font-family:var(--mono);font-size:.95rem;font-weight:700;}
.fb-sub{font-family:var(--mono);font-size:.6rem;color:rgba(240,238,232,.4);letter-spacing:.08em;text-transform:uppercase;}
.fb-body{padding:1.6rem;font-size:.87rem;line-height:1.85;color:var(--text);white-space:pre-wrap;min-height:80px;}
.score-row{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1.1rem;}
.sc{font-size:.67rem;font-weight:700;padding:.27rem .75rem;border-radius:100px;font-family:var(--mono);}
.sc.great{background:var(--greenl);color:var(--green);border:1px solid var(--greenm);}
.sc.ok{background:var(--amberl);color:var(--amber);border:1px solid var(--amberm);}
.sc.needs{background:var(--redl);color:var(--red);border:1px solid var(--redm);}

.typing-dot{display:inline-block;width:6px;height:6px;background:var(--blue);border-radius:50%;animation:blink 1.2s infinite;margin:0 2px;vertical-align:middle;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}

/* BUTTONS */
.btn{font-family:var(--sans);font-size:.86rem;font-weight:600;padding:.62rem 1.4rem;border-radius:var(--radius-sm);border:none;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--ink);color:#F0EEE8;}
.btn-primary:hover{background:#333;transform:translateY(-1px);}
.btn-primary:disabled{background:var(--border);color:var(--text-dim);cursor:not-allowed;transform:none;}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border);}
.btn-outline:hover{border-color:var(--text-muted);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#1B5E20;transform:translateY(-1px);}
.btn-row{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-top:1.1rem;}
.inst-box{padding:.8rem 1rem;border-radius:var(--radius-sm);font-size:.8rem;line-height:1.6;margin-bottom:1rem;border-left:3px solid;}
.divider{height:1px;background:var(--border);margin:1.25rem 0;}

/* RATIO CARD */
.ratio-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.65rem;margin-bottom:1.25rem;}
.ratio-card{border-radius:var(--radius-sm);padding:.75rem;text-align:center;border:1.5px solid transparent;}
.ratio-val{font-family:var(--mono);font-size:1.1rem;font-weight:700;margin-bottom:.25rem;}
.ratio-label{font-size:.65rem;font-weight:700;margin-bottom:.15rem;}
.ratio-desc{font-size:.58rem;opacity:.7;line-height:1.3;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .scenario-grid,.ratio-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const WORKER_URL="https://digitalmarketing.robert-nielson14.workers.dev";

// ── SCENARIOS ──
const SCENARIOS=[

  {

    desc:'High debt, thin margins, and a cash crisis. Tests whether students can identify financial warning signs.',
    health:[{label:'Low Margin',c:'#B71C1C',bg:'#FFEBEE'},{label:'High Debt',c:'#E65100',bg:'#FFF3E0'},{label:'Cash Crisis',c:'#B71C1C',bg:'#FFEBEE'}],

    incomeItems:[
      {name:'Sales Revenue',key:'salesRevenue',val:380000,section:'revenue',tip:'Money earned from product sales'},
      {name:'Service Revenue',key:'serviceRevenue',val:95000,section:'revenue',tip:'Money earned from services'},
      {name:'Cost of Goods Sold (COGS)',key:'cogs',val:285000,section:'cogs',tip:'Direct costs to produce goods sold'},
      {name:'Salaries & Wages',key:'salaries',val:110000,section:'opex',tip:'Employee compensation'},
      {name:'Rent & Utilities',key:'rent',val:48000,section:'opex',tip:'Facility costs'},
      {name:'Marketing & Advertising',key:'marketing',val:18000,section:'opex',tip:'Costs to promote the business'},
      {name:'Depreciation',key:'depreciation',val:22000,section:'opex',tip:'Non-cash asset cost allocation'},
      {name:'Interest Expense',key:'interest',val:32000,section:'nonop',tip:'High interest from heavy debt load'},
      {name:'Income Tax (21%)',key:'taxes',val:0,section:'nonop',tip:'No tax owed when there is a net loss'},

// ── COMPUTED HELPERS ──
function calcNet(s){
  const it=s.incomeItems;
  const get=key=>it.find(i=>i.key===key)?.val||0;
  const totalRev=get('salesRevenue')+get('serviceRevenue');
  const grossProfit=totalRev-get('cogs');
  const totalOpEx=it.filter(i=>i.section==='opex').reduce((a,i)=>a+i.val,0);
  const opIncome=grossProfit-totalOpEx;
  const ebt=opIncome-get('interest');
  const taxes=get('taxes');
  const netIncome=ebt-taxes;
  return{totalRev,grossProfit,totalOpEx,opIncome,ebt,taxes,netIncome};
}

function calcBal(s){
  const bi=s.balanceItems;
  const sum=sec=>bi.filter(i=>i.section===sec).reduce((a,i)=>a+i.val,0);
  const currentAssets=sum('currentAsset');
  const fixedAssetsNet=sum('fixedAsset');
  const totalAssets=currentAssets+fixedAssetsNet;
  const currentLiab=sum('currentLiab');
  const ltLiab=sum('ltLiab');
  const totalLiab=currentLiab+ltLiab;
  const equity=sum('equity')+calcNet(s).netIncome;
  return{currentAssets,fixedAssetsNet,totalAssets,currentLiab,ltLiab,totalLiab,equity,totalLiabEquity:totalLiab+equity};
}

function calcCF(s){
  const ni=calcNet(s).netIncome;
  const cf=s.cashFlowItems;
  const sum=sec=>cf.filter(i=>i.section===sec).reduce((a,i)=>a+i.val,0);
  const opCF=ni+sum('operating');
  const invCF=sum('investing');
  const finCF=sum('financing');
  const netChange=opCF+invCF+finCF;
  const endingCash=s.beginningCash+netChange;
  return{opCF,invCF,finCF,netChange,endingCash};
}

function fmt(n){
  if(n===null||n===undefined)return'—';
  const abs=Math.abs(Math.round(n));
  return n<0?'('+abs.toLocaleString()+')':''+abs.toLocaleString();
}
function fmtD(n){return n<0?'($'+Math.abs(Math.round(n)).toLocaleString()+')':'$'+Math.round(n).toLocaleString();}

  let correct=0,errors=0;
  const results=keys.map(key=>{

    return{key,name:s.incomeItems.find(i=>i.key===key)?.name||key,entered,right,ok};

function getBVal(key){return parseFloat(document.querySelector('input[data-key="'+key+'"][data-phase="balance"]')?.value)||0;}

function updateBalanceLive(){

  const totalFA=getBVal('ppe')+getBVal('accDeprec')+getBVal('intangibles');

  const totalCL=getBVal('ap')+getBVal('stDebt')+getBVal('accrued');
  const totalL=totalCL+getBVal('ltDebt')+getBVal('deferredRev');
  const totalE=getBVal('stock')+getBVal('retained');
  const totalLE=totalL+totalE;
  const balanced=Math.abs(totalA-totalLE)<2;

  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.textContent=fmtD(val);};
  set('bc-totalCA',totalCA);set('bc-totalFA',totalFA);set('bc-totalA',totalA);
  set('bc-totalCL',totalCL);set('bc-totalL',totalL);set('bc-totalE',totalE);set('bc-totalLE',totalLE);

  document.getElementById('bc-liab').textContent=fmtD(totalL);
  document.getElementById('bc-equity').textContent=fmtD(totalE);

  if(st){st.textContent=balanced?'✓ Balanced!':'⚠ Difference: '+fmtD(Math.abs(totalA-totalLE));st.className='bc-status '+(balanced?'balanced':'unbalanced');}

    </div>
    <div class="main">
      <div class="phase-header">
        <div class="ph-num" style="color:#E65100">4</div>
        <div>
          <div class="ph-title">Financial Analysis</div>
          <div class="ph-sub">Now interpret what the numbers mean. Use all three statements to answer the questions below. Reference specific numbers from your data — vague answers will score poorly.</div>
        </div>
        <span class="ph-badge" style="background:#FFF3E0;color:#E65100">Analysis Phase</span>
      </div>

      <div class="ratio-grid">
        ${ratioCard('Gross Margin',gpMargin+'%',parseFloat(gpMargin)>30?'pos':'neg','After direct costs')}
        ${ratioCard('Net Margin',netMargin+'%',parseFloat(netMargin)>10?'pos':parseFloat(netMargin)>0?'neu':'neg','Profit per revenue $')}
        ${ratioCard('Current Ratio',curRatio+'x',parseFloat(curRatio)>1.5?'pos':parseFloat(curRatio)>1?'neu':'neg','Short-term liquidity')}
        ${ratioCard('Debt Ratio',debtRatio+'%',parseFloat(debtRatio)<50?'pos':parseFloat(debtRatio)<70?'neu':'neg','% financed by debt')}
        ${ratioCard('ROI',roi+'%',parseFloat(roi)>10?'pos':parseFloat(roi)>0?'neu':'neg','Return on assets')}
      </div>

      <div class="analysis-card">
        <div class="aq">
          <div class="aq-num">Question 1 — Profitability (Income Statement)</div>
          <div class="aq-q">Is ${s.name} profitable? Calculate and explain the gross profit margin and net profit margin. What do these margins tell you about how well the business controls its costs?</div>
          <div class="aq-data">Total Revenue: ${fmtD(ci.totalRev)} · Gross Profit: ${fmtD(ci.grossProfit)} · Net Income: ${fmtD(ci.netIncome)}<br>Gross Margin: ${gpMargin}% · Net Margin: ${netMargin}%</div>
          <textarea id="aq1" placeholder="e.g. ${s.name} has a gross margin of ${gpMargin}% meaning that for every dollar of revenue, ${gpMargin} cents remain after paying direct costs. The net margin of ${netMargin}% means... Compared to healthy benchmarks (gross >30%, net >10%), this business is..."></textarea>
        </div>
        <div class="aq">
          <div class="aq-num">Question 2 — Liquidity & Debt (Balance Sheet)</div>
          <div class="aq-q">Can ${s.name} pay its short-term bills? Calculate the current ratio (Current Assets ÷ Current Liabilities). Is the debt level sustainable? Reference the debt ratio.</div>
          <div class="aq-data">Current Assets: ${fmtD(cb.currentAssets)} · Current Liabilities: ${fmtD(cb.currentLiab)}<br>Current Ratio: ${curRatio}x · Total Debt: ${fmtD(cb.totalLiab)} · Debt Ratio: ${debtRatio}%</div>
          <textarea id="aq2" placeholder="e.g. The current ratio of ${curRatio} means the company has $${curRatio} in current assets for every $1.00 of current liabilities. This [is/is not] concerning because... The debt ratio of ${debtRatio}% means..."></textarea>
        </div>
        <div class="aq">
          <div class="aq-num">Question 3 — Cash vs. Profit (Cash Flow Statement)</div>
          <div class="aq-q">Is ${s.name} generating real cash? Compare Net Income to Operating Cash Flow and explain why they are different. Why does this difference matter for business survival?</div>
          <div class="aq-data">Net Income: ${fmtD(ci.netIncome)} · Operating Cash Flow: ${fmtD(cf.opCF)}<br>Net Change in Cash: ${fmtD(cf.netChange)} · Ending Cash: ${fmtD(cf.endCash)}</div>
          <textarea id="aq3" placeholder="e.g. Net income was ${fmtD(ci.netIncome)} but operating cash flow was ${fmtD(cf.opCF)}. These differ because depreciation of $X is non-cash... A company can be profitable but cash-poor when..."></textarea>
        </div>
        <div class="aq">
          <div class="aq-num">Question 4 — Management Decision</div>
          <div class="aq-q">Based on all three financial statements, should ${s.name} expand operations next year? Make a specific recommendation and support it with at least 3 numbers from the statements.</div>
          <div class="aq-data">Use data from all three statements. Consider: profitability, cash position, debt load, and operating cash flow.</div>
          <textarea id="aq4" placeholder="e.g. I [recommend/do not recommend] expansion because the ROI of ${roi}% [supports/does not support] taking on additional risk... The operating cash flow of ${fmtD(cf.opCF)} [does/does not] provide enough internal funding... The debt ratio of ${debtRatio}% suggests..."></textarea>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-outline" onclick="phase=3;renderApp()">← Back</button>
        <button class="btn btn-primary" onclick="submitAnalysis()">Get AI Feedback →</button>
      </div>
    </div>
  </div>`;
  buildSidebar();
}

function submitAnalysis(){
  const fields=['aq1','aq2','aq3','aq4'];
  for(const id of fields){
    const el=document.getElementById(id);
    if(!el?.value.trim()||el.value.trim().length<30){
      el.style.borderColor='#B71C1C';el.focus();
      alert('Please answer all four questions before continuing.');return;
    }
  }
  studentAnalysis={aq1:document.getElementById('aq1').value.trim(),aq2:document.getElementById('aq2').value.trim(),aq3:document.getElementById('aq3').value.trim(),aq4:document.getElementById('aq4').value.trim()};
  phase=5;renderApp();
}

// ── PHASE 5: FEEDBACK ──
async function renderFeedback(){
  const s=scenario;
  const ci=calcNet(s);
  const cb=calcBal(s);
  const cf=calcCF(s);
  const gpMargin=((ci.grossProfit/ci.totalRev)*100).toFixed(1);
  const netMargin=((ci.netIncome/ci.totalRev)*100).toFixed(1);
  const curRatio=(cb.currentAssets/cb.currentLiab).toFixed(2);
  const debtRatio=((cb.totalLiab/cb.totalAssets)*100).toFixed(1);
  const roi=((ci.netIncome/cb.totalAssets)*100).toFixed(1);

  document.getElementById('app').innerHTML=`
  <header>
    <div class="hbrand"><h1>Financial Statements Simulator</h1><div class="sub">Business Management · Strand 5</div></div>
    <div class="hphases" id="hphases"></div>
    <div class="hright">
      <div><div class="hstat-label">Phase</div><div class="hstat-val" style="color:#81C784" id="h-phase">Complete</div></div>
      <div><div class="hstat-label">Company</div><div class="hstat-val" id="h-company">${s.name}</div></div>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div><div class="sb-label">All Statements ✓</div><div class="stmt-progress" id="sb-stmts"></div></div>
      <div><div class="sb-label">Final Numbers</div><div class="key-numbers" id="sb-kn"></div></div>
    </div>
    <div class="main">
      <div class="feedback-card">
        <div class="fb-header">
          <div class="fb-icon">📊</div>
          <div>
            <div class="fb-title">${s.name} — Financial Analysis Review</div>
            <div class="fb-sub">Business Management · Strand 5 · Standards 1–3</div>
          </div>
          <div style="margin-left:auto;text-align:right">
            <div style="font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,238,232,.3)">Statement Accuracy</div>
            <div style="font-family:var(--mono);font-size:.9rem;font-weight:700;color:#FFD54F;margin-top:.2rem">
              Income: ${studentIncome.correct||0}/${s.incomeItems.length} · Balance: ${studentBalance.correct||0}/${s.balanceItems.length} · CF: ${studentCF.correct||0}/${s.cashFlowItems.length+1}
            </div>
          </div>
        </div>
        <div style="padding:1.5rem;border-bottom:1px solid rgba(255,255,255,.1)">
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.25rem;font-size:.82rem">
            <div style="background:var(--bluel);border:1px solid var(--bluem);border-radius:var(--radius-sm);padding:.85rem">
              <div style="font-weight:700;color:var(--blue);margin-bottom:.4rem">📊 Income Statement</div>
              Revenue: ${fmtD(ci.totalRev)}<br>Gross Profit: ${fmtD(ci.grossProfit)}<br>Net Income: <strong style="color:${ci.netIncome>=0?'var(--green)':'var(--red)'}">${fmtD(ci.netIncome)}</strong>
            </div>
            <div style="background:var(--greenl);border:1px solid var(--greenm);border-radius:var(--radius-sm);padding:.85rem">
              <div style="font-weight:700;color:var(--green);margin-bottom:.4rem">⚖️ Balance Sheet</div>
              Total Assets: ${fmtD(cb.totalAssets)}<br>Total Liabilities: ${fmtD(cb.totalLiab)}<br>Owner's Equity: <strong style="color:${cb.equity>=0?'var(--green)':'var(--red)'}">${fmtD(cb.equity)}</strong>
            </div>
            <div style="background:var(--purplel);border:1px solid var(--purplem);border-radius:var(--radius-sm);padding:.85rem">
              <div style="font-weight:700;color:var(--purple);margin-bottom:.4rem">💸 Cash Flow</div>
              Operating CF: <strong style="color:${cf.opCF>=0?'var(--green)':'var(--red)'}">${fmtD(cf.opCF)}</strong><br>Net Change: ${fmtD(cf.netChange)}<br>Ending Cash: ${fmtD(cf.endCash)}
            </div>
          </div>
          <div class="score-row" id="score-row"></div>
          <div class="fb-body" id="fb-body"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
        </div>
      </div>
      <div class="btn-row" style="margin-top:.75rem">
        <button class="btn btn-outline" onclick="phase=0;renderSelect()">🔄 Try Another Company</button>
        <button class="btn btn-primary" onclick="window.print()">🖨️ Print / Save PDF</button>
      </div>
    </div>
  </div>`;
  buildHeader();buildSidebar();

  const systemPrompt=`You are a demanding but fair financial analysis professor reviewing a high school student's work on financial statements for Utah Business Management Strand 5. Hold work to real professional standards.

SCORING:
- "Great" = correctly interpreted ratios, used financial vocabulary accurately, drew logical conclusions from data
- "OK" = correct direction but missing depth, incomplete vocabulary, or weak connections between statements
- "Needs Work" = incorrect interpretation, misunderstood concepts, or conclusions not supported by numbers

Start with EXACTLY:
SCORES: Income Statement Analysis:[Great/OK/Needs Work] | Balance Sheet Analysis:[Great/OK/Needs Work] | Cash Flow Analysis:[Great/OK/Needs Work] | Management Decision:[Great/OK/Needs Work] | Overall Financial Literacy:[Great/OK/Needs Work]

Then 4 focused paragraphs:
1. Profitability analysis — did they correctly explain gross margin (${gpMargin}%) and net margin (${netMargin}%)? Did they use vocabulary: revenue, COGS, gross profit, operating expenses, net income?
2. Liquidity/solvency — did they correctly interpret the current ratio (${curRatio}x) and debt ratio (${debtRatio}%)? Did they explain what these mean for the company's financial health?
3. Cash vs profit — did they understand WHY net income (${fmtD(ci.netIncome)}) differs from operating cash flow (${fmtD(cf.opCF)})? Did they mention depreciation, working capital changes?
4. Management decision — was it supported by specific data? Was it logically consistent with what the numbers show?

End with one specific rewrite challenge — identify their weakest answer and show them what a stronger version looks like. No markdown ** or ##.`;

  const userPrompt=`Student Financial Analysis — ${s.name} (${s.type})

Statement accuracy: Income ${studentIncome.correct}/${s.incomeItems.length}, Balance ${studentBalance.correct}/${s.balanceItems.length}, Cash Flow ${studentCF.correct}/${s.cashFlowItems.length+1}

Key Financials: Revenue=${fmtD(ci.totalRev)}, Gross Profit=${fmtD(ci.grossProfit)} (${gpMargin}%), Net Income=${fmtD(ci.netIncome)} (${netMargin}%)
Total Assets=${fmtD(cb.totalAssets)}, Total Liabilities=${fmtD(cb.totalLiab)}, Equity=${fmtD(cb.equity)}, Current Ratio=${curRatio}x, Debt Ratio=${debtRatio}%
Operating CF=${fmtD(cf.opCF)}, Net Change=${fmtD(cf.netChange)}, Ending Cash=${fmtD(cf.endCash)}, ROI=${roi}%

Q1 (Profitability): "${studentAnalysis.aq1}"
Q2 (Liquidity/Solvency): "${studentAnalysis.aq2}"
Q3 (Cash vs Profit): "${studentAnalysis.aq3}"
Q4 (Management Decision): "${studentAnalysis.aq4}"`;

  try{
    const res=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1400,
        messages:[{role:'user',content:systemPrompt+'\n\n'+userPrompt}]})});
    const data=await res.json();
    const text=data.content?.[0]?.text||'Could not generate feedback.';
    const sm=text.match(/SCORES:(.+)/);
    let main=text;
    if(sm){
      main=main.replace(sm[0],'').trim();
      document.getElementById('score-row').innerHTML=sm[1].split('|').map(p=>{
        const[lbl,rat]=p.split(':').map(s=>s.trim());
        const cls=rat==='Great'?'great':rat==='OK'?'ok':'needs';
        return`<span class="sc ${cls}">${lbl}: ${rat}</span>`;
      }).join('');
    }
    document.getElementById('fb-body').textContent=main;
  }catch(err){
    document.getElementById('fb-body').textContent='Connection error: '+err.message;
  }
}

renderSelect();
</script>
</body>
</html>
