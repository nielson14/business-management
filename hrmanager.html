<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Management Simulator – Business Management</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0EDE8;--surface:#FFFFFF;--surface2:#ECEAE4;--surface3:#E2DFD8;
  --border:#D2CECC;--text:#1C1916;--text-muted:#6A6560;--text-dim:#ABA89E;
  --ink:#1C1916;
  --blue:#1565C0;--bluel:#E3F2FD;--bluem:rgba(21,101,192,.2);
  --green:#2E7D32;--greenl:#E8F5E9;--greenm:rgba(46,125,50,.2);
  --red:#C62828;--redl:#FFEBEE;--redm:rgba(198,40,40,.2);
  --amber:#E65100;--amberl:#FFF3E0;--amberm:rgba(230,81,0,.2);
  --purple:#6A1B9A;--purplel:#F3E5F5;--purplem:rgba(106,27,154,.2);
  --teal:#00695C;--teall:#E0F2F1;--tealm:rgba(0,105,92,.2);
  --radius:12px;--radius-sm:7px;
  --serif:'Playfair Display',serif;--sans:'Plus Jakarta Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--ink);color:#F0EDE8;display:flex;align-items:stretch;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--blue);}
.hbrand{padding:1rem 1.75rem;border-right:1px solid rgba(255,255,255,.08);flex-shrink:0;display:flex;flex-direction:column;justify-content:center;}
.hbrand h1{font-family:var(--serif);font-size:1.2rem;font-weight:700;color:#F0EDE8;font-style:italic;}
.hbrand .sub{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(240,237,232,.35);margin-top:.25rem;}
.hstages{display:flex;flex:1;}
.hstage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.5rem .4rem;border-right:1px solid rgba(255,255,255,.06);font-size:.55rem;color:rgba(240,237,232,.25);cursor:default;transition:all .2s;gap:.15rem;min-width:0;}
.hstage.active{background:rgba(255,255,255,.07);color:#F0EDE8;}
.hstage.done{color:rgba(100,200,120,.7);}
.hstage-num{font-size:.65rem;font-weight:700;}
.hstage-name{font-size:.55rem;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}
.hright{padding:.75rem 1.5rem;border-left:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:1.25rem;flex-shrink:0;}
.hstat-label{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,237,232,.3);}
.hstat-val{font-family:var(--serif);font-size:.95rem;font-weight:700;font-style:italic;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:250px 1fr;min-height:calc(100vh - 63px);}
.sidebar{background:var(--ink);color:#F0EDE8;padding:1.25rem;display:flex;flex-direction:column;gap:1.5rem;border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;}
.main{padding:1.75rem;overflow-y:auto;}
.sb-label{font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(240,237,232,.25);margin-bottom:.65rem;}

/* EMPLOYEE PROFILE (sidebar) */
.emp-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);padding:.9rem;}
.emp-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1565C0,#0D47A1);display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:.6rem;}
.emp-name{font-family:var(--serif);font-size:1rem;font-style:italic;font-weight:600;color:#F0EDE8;margin-bottom:.15rem;}
.emp-role{font-size:.65rem;color:rgba(240,237,232,.45);}
.emp-stats{display:flex;flex-direction:column;gap:.3rem;margin-top:.65rem;}
.emp-stat{display:flex;justify-content:space-between;align-items:center;font-size:.65rem;padding:.25rem 0;border-bottom:1px solid rgba(255,255,255,.06);}
.emp-stat:last-child{border-bottom:none;}
.emp-stat-label{color:rgba(240,237,232,.4);}
.emp-stat-val{font-weight:600;color:#F0EDE8;}
.emp-stat-val.good{color:#81C784;}
.emp-stat-val.warn{color:#FFD54F;}
.emp-stat-val.bad{color:#EF9A9A;}
.emp-stat-val.empty{color:rgba(240,237,232,.25);font-style:italic;}

/* STAGE PROGRESS */
.stage-list{display:flex;flex-direction:column;gap:.35rem;}
.stage-row{display:flex;align-items:center;gap:.6rem;padding:.45rem .6rem;border-radius:var(--radius-sm);border:1px solid transparent;transition:all .2s;}
.stage-row.active{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);}
.stage-row.done{opacity:.55;}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.stage-name{font-size:.7rem;color:rgba(240,237,232,.4);flex:1;}
.stage-row.active .stage-name{color:#F0EDE8;}
.stage-check{font-size:.68rem;color:rgba(100,200,120,.8);}

/* MAIN CARDS */
.stage-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem;animation:fadeUp .35s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.stage-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:1rem;}
.stage-num-big{font-family:var(--serif);font-size:3rem;font-weight:700;line-height:1;flex-shrink:0;width:55px;font-style:italic;}
.stage-title{font-family:var(--serif);font-size:1.45rem;font-weight:700;font-style:italic;margin-bottom:.3rem;}
.stage-sub{font-size:.8rem;color:var(--text-muted);line-height:1.55;max-width:500px;}
.stage-badge{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.24rem .65rem;border-radius:3px;margin-left:auto;flex-shrink:0;}
.stage-body{padding:1.5rem;}

/* FORM ELEMENTS */
.field-group{margin-bottom:1.1rem;}
label,.field-label{display:block;font-size:.68rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem;}
.field-hint{font-size:.62rem;color:var(--text-dim);font-weight:400;letter-spacing:0;text-transform:none;display:block;margin-top:.15rem;}
textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.75rem .9rem;font-family:var(--sans);font-size:.85rem;color:var(--text);resize:vertical;min-height:90px;outline:none;line-height:1.65;transition:border-color .15s;}
textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,.1);}
textarea::placeholder{color:var(--text-dim);}
input[type=text],input[type=number],select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:.6rem .85rem;font-family:var(--sans);font-size:.85rem;color:var(--text);outline:none;transition:border-color .15s;}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,.1);}
input::placeholder{color:var(--text-dim);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:.85rem;}
.divider{height:1px;background:var(--border);margin:1.25rem 0;}
.section-label{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.85rem;display:flex;align-items:center;gap:.65rem;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.inst-box{padding:.8rem 1rem;border-radius:var(--radius-sm);font-size:.8rem;line-height:1.6;margin-bottom:1rem;border-left:3px solid;}

/* CANDIDATE CARDS */
.candidate-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem;margin-bottom:1rem;}
.candidate-card{background:var(--surface2);border:2px solid var(--border);border-radius:var(--radius-sm);padding:1rem;cursor:pointer;transition:all .15s;position:relative;}
.candidate-card:hover{border-color:var(--blue);}
.candidate-card.selected{border-color:var(--blue);background:var(--bluel);}
.candidate-rank{position:absolute;top:.65rem;right:.65rem;width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
.candidate-name{font-weight:700;font-size:.95rem;margin-bottom:.2rem;}
.candidate-role{font-size:.7rem;color:var(--text-muted);margin-bottom:.6rem;}
.candidate-stats{display:flex;flex-direction:column;gap:.25rem;}
.cstat{display:flex;align-items:center;gap:.4rem;font-size:.72rem;}
.cstat-icon{font-size:.75rem;flex-shrink:0;}
.cstat-val{color:var(--text-muted);}
.cstat-val strong{color:var(--text);}
.candidate-flag{display:inline-block;font-size:.6rem;font-weight:600;padding:.1rem .4rem;border-radius:3px;margin-top:.5rem;}

/* RANKING SYSTEM */
.rank-selector{display:flex;gap:.4rem;margin-top:.65rem;}
.rank-btn{flex:1;padding:.4rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.72rem;font-weight:600;text-align:center;cursor:pointer;transition:all .15s;background:var(--surface);}
.rank-btn:hover{border-color:var(--blue);}
.rank-btn.sel-1{background:var(--greenl);border-color:var(--green);color:var(--green);}
.rank-btn.sel-2{background:var(--bluel);border-color:var(--blue);color:var(--blue);}
.rank-btn.sel-3{background:var(--amberl);border-color:var(--amber);color:var(--amber);}
.rank-btn.sel-4{background:var(--redl);border-color:var(--red);color:var(--red);}

/* INTERVIEW QUESTIONS */
.question-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
.q-item{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem .9rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;}
.q-item:hover{border-color:var(--text-muted);}
.q-item.selected{border-color:var(--blue);background:var(--bluel);}
.q-item.selected-illegal{border-color:var(--red);background:var(--redl);}
.q-checkbox{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;margin-top:.1rem;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .15s;}
.q-item.selected .q-checkbox{background:var(--blue);border-color:var(--blue);color:#fff;}
.q-item.selected-illegal .q-checkbox{background:var(--red);border-color:var(--red);color:#fff;}
.q-text{font-size:.84rem;line-height:1.5;flex:1;}
.q-tag{font-size:.6rem;font-weight:600;padding:.1rem .4rem;border-radius:3px;margin-left:.5rem;}

/* PERFORMANCE RATINGS */
.perf-grid{display:flex;flex-direction:column;gap:.65rem;margin-bottom:1rem;}
.perf-row{display:flex;align-items:center;gap:.85rem;padding:.75rem 1rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);}
.perf-category{flex:1;font-size:.83rem;font-weight:500;}
.perf-data{font-size:.72rem;color:var(--text-muted);flex:0 0 auto;}
.rating-btns{display:flex;gap:.3rem;flex-shrink:0;}
.rating-btn{padding:.3rem .55rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.7rem;font-weight:600;cursor:pointer;transition:all .12s;background:var(--surface);}
.rating-btn:hover{border-color:var(--text-muted);}
.rating-btn.r1{background:var(--redl);border-color:var(--red);color:var(--red);}
.rating-btn.r2{background:var(--amberl);border-color:var(--amber);color:var(--amber);}
.rating-btn.r3{background:var(--bluel);border-color:var(--blue);color:var(--blue);}
.rating-btn.r4{background:var(--greenl);border-color:var(--green);color:var(--green);}

/* CHIP SELECTORS */
.chip-group{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.4rem;}
.chip{padding:.3rem .75rem;border:1.5px solid var(--border);border-radius:100px;font-size:.75rem;cursor:pointer;background:var(--surface2);color:var(--text-muted);transition:all .15s;user-select:none;}
.chip:hover{border-color:var(--blue);}
.chip.selected{background:var(--bluel);border-color:var(--blue);color:var(--blue);font-weight:600;}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
.tl-week{display:flex;align-items:flex-start;gap:.85rem;}
.tl-marker{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.tl-dot{width:32px;height:32px;border-radius:50%;background:var(--blue);color:#fff;font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
.tl-line{width:2px;flex:1;background:var(--border);min-height:20px;margin-top:4px;}
.tl-content{flex:1;padding-bottom:1rem;}
.tl-label{font-size:.72rem;font-weight:700;color:var(--text-muted);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.06em;}
.tl-input textarea{min-height:65px;}

/* PIP SECTION */
.pip-box{background:var(--amberl);border:2px solid var(--amber);border-radius:var(--radius-sm);padding:1rem 1.25rem;margin-bottom:1rem;}
.pip-title{font-weight:700;color:var(--amber);margin-bottom:.5rem;font-size:.9rem;}
.pip-text{font-size:.82rem;color:var(--text-muted);line-height:1.6;}

/* TERMINATION OPTIONS */
.term-opts{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1.25rem;}
.term-opt{display:flex;align-items:flex-start;gap:.85rem;padding:.95rem 1.1rem;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;}
.term-opt:hover{border-color:var(--text-muted);}
.term-opt.selected{border-color:var(--blue);background:var(--bluel);}
.term-opt-icon{font-size:1.4rem;flex-shrink:0;}
.term-opt-name{font-weight:700;font-size:.88rem;margin-bottom:.2rem;}
.term-opt-desc{font-size:.78rem;color:var(--text-muted);line-height:1.45;}

/* FEEDBACK */
.feedback-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.fb-header{background:var(--ink);color:#F0EDE8;padding:1.1rem 1.5rem;display:flex;align-items:center;gap:.85rem;}
.fb-icon{font-size:1.6rem;}
.fb-title{font-family:var(--serif);font-size:.95rem;font-weight:700;font-style:italic;}
.fb-sub{font-size:.6rem;color:rgba(240,237,232,.4);letter-spacing:.08em;text-transform:uppercase;}
.fb-body{padding:1.6rem;font-size:.87rem;line-height:1.85;color:var(--text);white-space:pre-wrap;min-height:80px;}
.score-row{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1.1rem;}
.sc{font-size:.67rem;font-weight:700;padding:.27rem .75rem;border-radius:100px;}
.sc.great{background:var(--greenl);color:var(--green);border:1px solid var(--greenm);}
.sc.ok{background:var(--amberl);color:var(--amber);border:1px solid var(--amberm);}
.sc.needs{background:var(--redl);color:var(--red);border:1px solid var(--redm);}
.typing-dot{display:inline-block;width:6px;height:6px;background:var(--blue);border-radius:50%;animation:blink 1.2s infinite;margin:0 2px;vertical-align:middle;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}

/* BUTTONS */
.btn{font-family:var(--sans);font-size:.86rem;font-weight:600;padding:.65rem 1.5rem;border-radius:var(--radius-sm);border:none;cursor:pointer;transition:all .2s;}
.btn-primary{background:var(--ink);color:#F0EDE8;}
.btn-primary:hover{background:#333;transform:translateY(-1px);}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border);}
.btn-outline:hover{border-color:var(--text-muted);}
.btn-row{display:flex;gap:.65rem;align-items:center;flex-wrap:wrap;margin-top:1.25rem;}

/* INTRO */
.intro-screen{max-width:640px;margin:2.5rem auto;padding:2rem;}
.intro-logo{text-align:center;font-size:3.5rem;margin-bottom:1rem;}
.intro-title{font-family:var(--serif);font-size:2rem;font-weight:700;text-align:center;font-style:italic;margin-bottom:.5rem;}
.intro-sub{text-align:center;color:var(--text-muted);line-height:1.65;margin-bottom:1.5rem;}
.intro-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:.85rem;}
.intro-card-title{font-family:var(--serif);font-size:.95rem;font-weight:700;font-style:italic;margin-bottom:.6rem;}
.stage-preview{display:flex;flex-direction:column;gap:.4rem;}
.sp-item{display:flex;align-items:center;gap:.6rem;font-size:.82rem;padding:.35rem 0;}
.sp-num{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .grid-2,.grid-3,.candidate-grid{grid-template-columns:1fr;}
}
</style>
</head>

<div id="app"></div>
<script>
const WORKER_URL="https://digitalmarketing.robert-nielson14.workers.dev";

const STAGES=[

  {id:'q12',text:'What religion do you practice? We have some team events on weekends.',legal:false,category:'⚠️ ILLEGAL'},

// PERFORMANCE DATA for Alex (Stage 5)
const PERF_CATEGORIES=[
  {id:'quality',label:'Quality of Work',data:'4 of 5 campaigns met KPIs. One major campaign underdelivered by 22%.',expected:'Meets expectations'},
  {id:'deadlines',label:'Meeting Deadlines',data:'3 missed deadlines in 6 months. 2 required manager intervention.',expected:'Needs improvement'},

  {id:'attendance',label:'Attendance & Reliability',data:'2 unexcused absences. Generally punctual.',expected:'Meets expectations'},

// ── HELPERS ──
function buildHeader(){
  const el=document.getElementById('hstages');
  if(!el)return;
  el.innerHTML=STAGES.map((s,i)=>`
    <div class="hstage ${stage===i?'active':stage>i?'done':''}">
      <div class="hstage-num">${stage>i?'✓':i+1}</div>
      <div class="hstage-name">${s.name}</div>
    </div>`).join('');
  const hn=document.getElementById('h-stage');
  if(hn)hn.textContent=stage<STAGES.length?STAGES[stage].name:'Complete';
  const he=document.getElementById('h-emp');
  if(he)he.textContent=empProfile.status;
}

function buildSidebar(){
  const sl=document.getElementById('sb-stages');
  if(sl)sl.innerHTML=STAGES.map((s,i)=>`
    <div class="stage-row ${stage===i?'active':stage>i?'done':''}">
      <div class="stage-dot" style="background:${stage>i?'#4CAF50':stage===i?s.color.replace('var(--','').replace(')',''):' rgba(255,255,255,.15)'}"></div>
      <div class="stage-name">${s.name}</div>
      ${stage>i?'<div class="stage-check">✓</div>':''}
    </div>`).join('');

  const ep=document.getElementById('sb-emp');
  if(ep){
    const sc=savedData.selectedCandidate;
    const cand=CANDIDATES.find(c=>c.id===sc);
    ep.innerHTML=`
      <div class="emp-avatar">${stage>=2&&cand?cand.emoji:'👤'}</div>
      <div class="emp-name">${stage>=2&&cand?cand.name:'Pending Hire'}</div>
      <div class="emp-role">${empProfile.role}</div>
      <div class="emp-stats">
        <div class="emp-stat"><span class="emp-stat-label">Status</span><span class="emp-stat-val ${empProfile.status==='Active Employee'?'good':empProfile.status==='PIP'?'warn':empProfile.status==='Terminated'?'bad':''}">${empProfile.status}</span></div>
        <div class="emp-stat"><span class="emp-stat-label">Salary</span><span class="emp-stat-val ${empProfile.salary?'':'empty'}">${empProfile.salary?'$'+empProfile.salary+'/yr':'—'}</span></div>

        <div class="emp-stat"><span class="emp-stat-label">Performance</span><span class="emp-stat-val ${empProfile.rating==='Exceeds'?'good':empProfile.rating==='Meets'?'':empProfile.rating?'warn':'empty'}">${empProfile.rating||'—'}</span></div>

function renderApp(){
  buildHeader();buildSidebar();
  window.scrollTo({top:0,behavior:'smooth'});
  const renders=[renderPost,renderScreen,renderHire,renderOnboard,renderAppraise,renderDecide];
  if(stage<renders.length)renders[stage]();
  else renderFeedback();
}

function setRank(candId,rank){
  // Enforce unique ranks
  Object.keys(savedData.candidateRanks).forEach(k=>{if(savedData.candidateRanks[k]===rank&&k!==candId)delete savedData.candidateRanks[k];});
  savedData.candidateRanks[candId]=rank;
  // Re-render rank buttons
  CANDIDATES.forEach(cand=>{
    const r=savedData.candidateRanks[cand.id];
    const card=document.getElementById('ccard-'+cand.id);
    if(!card)return;
    card.querySelectorAll('.rank-btn').forEach((btn,i)=>{
      btn.className='rank-btn '+(r===i+1?'sel-'+(i+1):'');
    });
  });
}

function saveScreen(){
  savedData.screeningReason=document.getElementById('screeningReason')?.value.trim();
  const ranks=savedData.candidateRanks;
  if(Object.keys(ranks).length<4){alert('Please rank all 4 candidates before continuing.');return;}
  if(!savedData.screeningReason||savedData.screeningReason.length<30){alert('Please explain your ranking decisions.');return;}
  // Set top candidate
  const top=Object.entries(ranks).find(([k,v])=>v===1)?.[0]||'alex';
  savedData.selectedCandidate=top;
  const cand=CANDIDATES.find(c=>c.id===top);
  empProfile.name=cand?.name||'Alex Rivera';
  empProfile.status='Interview Stage';
  stage=2;renderApp();
}

function toggleQuestion(id,isIllegal){
  const idx=savedData.selectedQuestions.indexOf(id);
  if(idx>=0)savedData.selectedQuestions.splice(idx,1);
  else{if(savedData.selectedQuestions.length>=8){alert('You can select a maximum of 8 interview questions.');return;}savedData.selectedQuestions.push(id);}
  const el=document.getElementById('q-item-'+id);
  const item=document.querySelector(`[onclick="toggleQuestion('${id}',${isIllegal})"]`);
  if(item){
    const sel=savedData.selectedQuestions.includes(id);
    item.classList.toggle('selected',sel&&!isIllegal);
    item.classList.toggle('selected-illegal',sel&&isIllegal);
    const cb=item.querySelector('.q-checkbox');
    if(cb)cb.textContent=sel?'✓':'';
  }
  // Count illegal questions silently for feedback scoring
  const illegalIds=INTERVIEW_QUESTIONS.filter(q=>!q.legal).map(q=>q.id);
  savedData.illegalQuestionsAsked=savedData.selectedQuestions.filter(id=>illegalIds.includes(id)).length;
}

function toggleBenefit(b){
  const idx=savedData.offerBenefits.indexOf(b);
  if(idx>=0)savedData.offerBenefits.splice(idx,1);
  else savedData.offerBenefits.push(b);
  document.querySelectorAll('.chip').forEach(el=>{
    const isSelected=savedData.offerBenefits.includes(el.textContent);
    el.classList.toggle('selected',isSelected);
  });
}

function saveHire(){

  empProfile.status='Active Employee';
  stage=3;renderApp();
}

    if(sm){
      main=main.replace(sm[0],'').trim();
      document.getElementById('score-row').innerHTML=sm[1].split('|').map(p=>{
        const[lbl,rat]=p.split(':').map(s=>s.trim());
        const cls=rat==='Great'?'great':rat==='OK'?'ok':'needs';
        return`<span class="sc ${cls}">${lbl}: ${rat}</span>`;
      }).join('');
    }
    document.getElementById('fb-body').textContent=main;
  }catch(err){
    document.getElementById('fb-body').textContent='Connection error: '+err.message;
  }
}

renderIntro();
</script>
</body>
</html>
